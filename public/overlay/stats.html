<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TikShank — Stats Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:transparent; font-family:'DM Mono',monospace; overflow:hidden; }
  #stats {
    position: fixed;
    top: 30px; right: 30px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 180px;
  }
  .stat {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    background: rgba(13,17,23,.85);
    backdrop-filter: blur(12px);
    border-radius: 9px;
    border: 1px solid rgba(255,255,255,.06);
    gap: 8px;
  }
  .s-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.45); letter-spacing:.06em; text-transform:uppercase; }
  .s-val { font-size: 16px; font-weight: 700; color: #fff; }
  .s-val.red    { color: #fe2c55; }
  .s-val.cyan   { color: #25f4ee; }
  .s-val.gold   { color: #ffc14d; }
  .s-val.green  { color: #0dff8c; }
</style>
</head>
<body>
<div id="stats">
  <div class="stat"><span class="s-label">👁 Viewers</span><span class="s-val red"   id="sv">0</span></div>
  <div class="stat"><span class="s-label">❤️ Likes</span>  <span class="s-val cyan"  id="sl">0</span></div>
  <div class="stat"><span class="s-label">👤 Follows</span><span class="s-val green" id="sf">0</span></div>
  <div class="stat"><span class="s-label">🎁 Regalos</span><span class="s-val gold"  id="sg">0</span></div>
  <div class="stat"><span class="s-label">🪙 Monedas</span><span class="s-val gold"  id="sc">0</span></div>
</div>
<script>
const socket = io();
const map = { viewers:'sv', likes:'sl', followers:'sf', gifts:'sg', giftPoints:'sc' };

socket.on('state:full', d => d.stats && update(d.stats));
socket.on('stats:update', update);
socket.on('event:like', e => { if(e.totalLikes) set('sl', e.totalLikes); });
socket.on('leaderboard:update', () => {});

function update(d) {
  for (const [k,id] of Object.entries(map)) {
    if (d[k] !== undefined) set(id, d[k]);
  }
}
function set(id, n) {
  const el = document.getElementById(id);
  if (el) el.textContent = fmt(n);
}
function fmt(n) {
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n;
}
</script>
</body>
</html>
