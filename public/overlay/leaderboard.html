<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TikShank — Leaderboard Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:transparent; font-family:'Syne',sans-serif; overflow:hidden; }
  #lb {
    position: fixed;
    top: 30px; left: 30px;
    width: 300px;
  }
  .lb-title {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(255,193,77,.8);
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .lb-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 5px;
    background: rgba(13,17,23,.85);
    backdrop-filter: blur(12px);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.06);
    animation: slideRight .3s ease;
    transition: all .3s ease;
  }
  @keyframes slideRight {
    from { opacity:0; transform: translateX(-20px); }
    to   { opacity:1; transform: translateX(0); }
  }
  .rank { font-size: 18px; flex-shrink:0; width: 28px; text-align:center; }
  .name { flex:1; font-size: 14px; font-weight: 700; color: #e8edf5; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .score { font-family:'DM Mono',monospace; font-size: 13px; font-weight: 700; color: #ffc14d; }
  .lb-item:nth-child(1) { border-color: rgba(255,193,77,.3); }
  .lb-item:nth-child(2) { border-color: rgba(192,192,192,.2); }
  .lb-item:nth-child(3) { border-color: rgba(205,127,50,.2); }
</style>
</head>
<body>
<div id="lb">
  <div class="lb-title">🏆 Top Gifters</div>
</div>
<script>
const socket = io();
const MEDALS = ['🥇','🥈','🥉'];

socket.on('state:full', d => {
  if (d.leaderboard?.gifters) render(d.leaderboard.gifters);
});
socket.on('leaderboard:update', d => {
  if (d.gifters) render(d.gifters);
});

function render(data) {
  const lb = document.getElementById('lb');
  const title = lb.querySelector('.lb-title');
  lb.innerHTML = '';
  lb.appendChild(title);

  data.slice(0, 5).forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'lb-item';
    el.innerHTML = `
      <div class="rank">${i < 3 ? MEDALS[i] : i+1}</div>
      <div class="name">${esc(item.name||'?')}</div>
      <div class="score">🪙 ${fmt(item.points||0)}</div>
    `;
    lb.appendChild(el);
  });
}

function fmt(n) {
  if (n>=1e6) return (n/1e6).toFixed(1)+'M';
  if (n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
