<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TikShank — Follows Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:transparent; font-family:'Syne',sans-serif; overflow:hidden; }
  #follows {
    position: fixed;
    top: 30px; left: 50%;
    transform: translateX(-50%);
    width: 460px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  .fol {
    background: rgba(13,17,23,.88);
    backdrop-filter: blur(16px);
    border-radius: 50px;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: popCenter .5s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.08);
    min-width: 280px;
    justify-content: center;
  }
  .fol.follow    { border-color: rgba(13,255,140,.3); box-shadow: 0 0 30px rgba(13,255,140,.1); }
  .fol.subscribe { border-color: rgba(168,85,247,.3); box-shadow: 0 0 30px rgba(168,85,247,.1); }

  @keyframes popCenter {
    from { opacity:0; transform: scale(.7); }
    to   { opacity:1; transform: scale(1); }
  }
  @keyframes popOut {
    to { opacity:0; transform: scale(.8); max-height:0; margin:0; padding:0; }
  }

  .f-icon { font-size: 24px; }
  .f-text { font-size: 16px; font-weight: 800; color: #fff; }
  .f-text .name { color: #0dff8c; }
  .f-text.sub .name { color: #a855f7; }
</style>
</head>
<body>
<div id="follows"></div>
<script>
const socket = io();
const c = document.getElementById('follows');

socket.on('event:follow',    e => show('follow',    `<span class="name">${esc(e.nickname)}</span> te siguió 👤`));
socket.on('event:subscribe', e => show('subscribe', `<span class="name">${esc(e.nickname)}</span> se suscribió ⭐`));

function show(type, html) {
  const el = document.createElement('div');
  el.className = `fol ${type}`;
  el.innerHTML = `
    <div class="f-icon">${type==='follow'?'👤':'⭐'}</div>
    <div class="f-text${type==='subscribe'?' sub':''}">¡${html}!</div>
  `;
  c.insertBefore(el, c.firstChild);
  setTimeout(() => { el.style.animation='popOut .4s ease forwards'; setTimeout(()=>el.remove(),400); }, 5000);
  while (c.children.length > 3) c.removeChild(c.lastChild);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
