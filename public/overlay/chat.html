<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TikShank — Chat Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:transparent; font-family:'Syne',sans-serif; overflow:hidden; height:100vh; }
  #chat {
    position: fixed;
    bottom: 30px; left: 30px;
    width: 380px;
    max-height: 500px;
    display: flex;
    flex-direction: column-reverse;
    gap: 5px;
    overflow: hidden;
  }
  .msg {
    padding: 9px 13px;
    background: rgba(13,17,23,.82);
    backdrop-filter: blur(10px);
    border-radius: 9px;
    border-left: 3px solid #25f4ee;
    font-size: 13px;
    animation: fadeUp .3s ease;
    max-height: 80px;
    overflow: hidden;
  }
  .msg.gift      { border-left-color: #ffc14d; }
  .msg.follow    { border-left-color: #0dff8c; }
  .msg.subscribe { border-left-color: #a855f7; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .m-user { font-weight: 700; color: #fff; font-size: 12px; }
  .m-user.gift-user { color: #ffc14d; }
  .m-text { color: rgba(255,255,255,.75); font-size: 13px; margin-top: 2px; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>
</head>
<body>
<div id="chat"></div>
<script>
const socket = io();
const container = document.getElementById('chat');

socket.on('event:chat', e => addMsg('chat', e.nickname, e.comment));
socket.on('event:gift', e => addMsg('gift', e.nickname, `regaló ${e.giftName} ×${e.count||1} 🪙${e.totalCoins}`));
socket.on('event:follow', e => addMsg('follow', e.nickname, '¡Nuevo seguidor!'));
socket.on('event:subscribe', e => addMsg('subscribe', e.nickname, '¡Nueva suscripción! ⭐'));

function addMsg(type, user, text) {
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  el.innerHTML = `
    <div class="m-user ${type==='gift'?'gift-user':''}">${esc(user)}</div>
    <div class="m-text">${esc(text)}</div>
  `;
  container.insertBefore(el, container.firstChild);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .5s'; setTimeout(()=>el.remove(),500); }, 12000);
  while (container.children.length > 15) container.removeChild(container.lastChild);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
