   Cola única — nunca se traba aunque falle EL              */
const ttsQueue  = [];

/* ─── TTS text processing ──────────────────────────── */
function stripEmojis(text) {
  if (!text) return '';
  // Eliminar secuencias emoji completas (ZWJ sequences, skin tones, variantes)
  let t = text
    // Secuencias ZWJ y modificadores de skin tone
    .replace(/\p{Emoji_Presentation}\p{Emoji_Modifier}*/gu, '')
    // Cualquier emoji con sus variantes y selectores de texto
    .replace(/\p{Extended_Pictographic}(\u{FE0F})?(\u{20E3})?/gu, '')
    // Rangos Unicode adicionales
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')  // Mahjong, dominó, juegos, emojis
    .replace(/[\u{2600}-\u{27BF}]/gu, '')    // Símbolos varios, dingbats
    .replace(/[\u{2300}-\u{23FF}]/gu, '')    // Símbolos técnicos
    .replace(/[\u{2B00}-\u{2BFF}]/gu, '')    // Flechas adicionales
    .replace(/[\u{FE00}-\u{FEFF}]/gu, '')    // Selectores de variante
    .replace(/[\u{E0000}-\u{E007F}]/gu, '')  // Tags
    .replace(/[\u{1F300}-\u{1F9FF}]/gu, '')  // Emojis principales
    .replace(/[\u{1FA00}-\u{1FAFF}]/gu, '')  // Emojis extendidos
    .replace(/[\u{200D}\u{20E3}\u{FE0F}]/gu, '') // ZWJ, combinadores
    .replace(/[\u00A9\u00AE\u203C\u2049\u2122\u2139\u2194-\u2199\u21A9-\u21AA\u231A-\u231B\u2328\u23CF\u23E9-\u23F3\u23F8-\u23FA\u24C2\u25AA-\u25AB\u25B6\u25C0\u25FB-\u25FE\u2600-\u2604\u260E\u2611\u2614-\u2615\u2618\u261D\u2620\u2622-\u2623\u2626\u262A\u262E-\u262F\u2638-\u263A\u2640\u2642\u2648-\u2653\u265F-\u2660\u2663\u2665-\u2666\u2668\u267B\u267E-\u267F\u2692-\u2697\u2699\u269B-\u269C\u26A0-\u26A1\u26A7\u26AA-\u26AB\u26B0-\u26B1\u26BD-\u26BE\u26C4-\u26C5\u26CE-\u26CF\u26D1\u26D3-\u26D4\u26E9-\u26EA\u26F0-\u26F5\u26F7-\u26FA\u26FD\u2702\u2705\u2708-\u270D\u270F\u2712\u2714\u2716\u271D\u2721\u2728\u2733-\u2734\u2744\u2747\u274C\u274E\u2753-\u2755\u2757\u2763-\u2764\u2795-\u2797\u27A1\u27B0\u27BF\u2934-\u2935\u2B05-\u2B07\u2B1B-\u2B1C\u2B50\u2B55\u3030\u303D\u3297\u3299]/gu, '');
  // Limpiar espacios múltiples que quedan tras quitar emojis
  return t.replace(/\s+/g, ' ').trim();
}

function filterText(text, blocked) {
  // Siempre quitar emojis — el bot solo lee texto
  let t = stripEmojis(text);
  for (const w of (blocked||[])) {
    if (!w) continue;
    try { t = t.replace(new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b','gi'),''); } catch(e){}
  }
  return t.trim();
}

function shouldReadUser(data, allR, followR, modR, sfanR, fcR, fcLvlR, cusR) {
  // Si ningún filtro está activo → leer todo (comportamiento por defecto)
  const anyFilterOn = followR.current || modR.current || sfanR.current || fcR.current || (cusR.current||[]).length > 0;
  if (!anyFilterOn || allR.current) return true;

  // Hay al menos un filtro activo → verificar si el usuario pasa alguno
  const user = (data.user||data.uniqueId||"").toLowerCase().replace(/^@/,'');
  if ((cusR.current||[]).some(u => u.toLowerCase().replace(/^@/,'') === user)) return true;
  // followRole: 1=seguidor, 2=amigo. isModerator, isSubscriber pueden venir como bool o 1/0
  if (followR.current && (data.followRole === 1 || data.followRole === 2)) return true;
  if (modR.current    && (data.isModerator === true  || data.isModerator === 1)) return true;
  if (sfanR.current   && (data.isSubscriber === true || data.isSubscriber === 1)) return true;
  if (fcR.current     && (data.teamMemberLevel||0) >= (fcLvlR.current||1)) return true;
  return false;
}


/* ─── Apply TTS template ──────────────────────────── */
function applyTpl(tpl, vars) {
  // Limpiar emojis de cada variable (nickname, username, message, etc.) antes de insertar
  const clean = {};
  for (const k in vars) clean[k] = stripEmojis(String(vars[k] ?? ''));
  return tpl.replace(/\{(\w+)\}/g, (_, k) => (clean[k] !== undefined ? clean[k] : ''));
}
function enqueueTTS(text, voiceId, vol, mode) {
  if (!text || !text.trim()) return;
  ttsQueue.push({ text: text.trim(), voiceId, vol, mode });
  if (!ttsActive) drainQueue();
}

async function drainQueue() {
  if (ttsQueue.length === 0) { ttsActive = false; return; }
  ttsActive = true;
  const item = ttsQueue.shift();
  try {
    if (item.mode === "elevenlabs") {
      await speakElevenLabs(item.text, item.voiceId, item.vol);
    } else if (item.mode === "google") {
      await speakGoogle(item.text, item.voiceId, item.vol);
    } else {
      await speakNative(item.text, item.voiceId, item.vol);
    }
  } catch(e) {
    console.warn("TTS falló, siguiente:", e.message);
  }
  // Siempre continuar la cola
  setTimeout(drainQueue, 50);
}

async function speakElevenLabs(text, voiceId, vol) {
  const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
    method: "POST",
    headers: { "xi-api-key": EL_KEY, "Content-Type": "application/json", "Accept": "audio/mpeg" },
    body: JSON.stringify({ text, model_id: "eleven_multilingual_v2", voice_settings:{ stability:0.5, similarity_boost:0.75 } }),
    signal: AbortSignal.timeout(10000),
  });
  if (!r.ok) throw new Error("EL HTTP " + r.status);
  const blob = await r.blob();
  const url  = URL.createObjectURL(blob);
  await playAudio(url, vol);
  URL.revokeObjectURL(url);
}

async function speakGoogle(text, lang, vol) {
  // Google Translate TTS API (gratuita)
  const isMale = lang.endsWith("-m");
  const langCode = isMale ? lang.replace("-m","") : lang;
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${langCode}&total=1&idx=0&textlen=${text.length}&client=tw-ob`;
  await playAudio(url, vol);
}

const _savedRate  = (() => { try { const v=localStorage.getItem("tp_nativeRate");  return v!==null?JSON.parse(v):1.05; } catch(e){ return 1.05; } })();
const _savedPitch = (() => { try { const v=localStorage.getItem("tp_nativePitch"); return v!==null?JSON.parse(v):1;    } catch(e){ return 1;    } })();
const nativeTTSConfig = { rate: _savedRate, pitch: _savedPitch };

function speakNative(text, voiceId, vol) {
  return new Promise((res) => {
    if (!window.speechSynthesis) { res(); return; }
    window.speechSynthesis.cancel();
    function doSpeak() {
      const utt   = new SpeechSynthesisUtterance(text);
      utt.volume  = Math.min(1, Math.max(0, vol));
      utt.rate    = nativeTTSConfig.rate;
      utt.pitch   = nativeTTSConfig.pitch;
      utt.lang    = "es-MX";
      const voices = window.speechSynthesis.getVoices();
      if (voiceId) {
        const byName = voices.find(v => v.name === voiceId);
        if (byName) utt.voice = byName;
      }
      if (!utt.voice) {
        const esVoice = voices.find(v => v.lang.startsWith("es"));
        if (esVoice) utt.voice = esVoice;
      }
      utt.onend   = res;
      utt.onerror = res;
      window.speechSynthesis.speak(utt);
      setTimeout(res, 15000);
    }
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
      doSpeak();
    } else {
      window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.onvoiceschanged = null; doSpeak(); };
      setTimeout(doSpeak, 500); // fallback si onvoiceschanged no dispara
    }
  });
}



function playAudio(src, vol) {
  return new Promise((res) => {
    const a    = new Audio(src);
    a.volume   = Math.min(1, Math.max(0, vol));
    a.onended  = res;
    a.onerror  = res;
    a.play().catch(res);
    setTimeout(res, 30000); // max 30s
  });
}

/* ─── Conversión base64 para persistir audio ──────── */
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function ActModal({ action, ttsMode, ttsVoiceId, ttsNativeVoice, vol, onSave, onClose }) {
  const def = {
    id: Date.now(), enabled:true, name:"", event:"Gift Alert",
    giftName:"Cualquier regalo", minCount:1, duration:5,
    soundName:"", soundData:"", ttsOn:false, ttsText:"",

  };

  const testTTS = () => {
    const text = (f.ttsText||"Hola, esto es una prueba").replace(/@usuario/gi, "UsuarioPrueba");

  };

    <div className="mo" onClick={e => e.target.classList.contains("mo") && onClose()}>

function Login({ onLogin }) {
  const [email,   setEmail]   = useState("");
  const [pass,    setPass]    = useState("");
  const [err,     setErr]     = useState("");
  const [loading, setLoading] = useState(false);

  const go = () => {
    setErr(""); setLoading(true);
    setTimeout(() => {
      const u = USERS[email.toLowerCase()];
      if (u && u.password === pass) { onLogin({...u, email}); }
      else { setErr("Correo o contraseña incorrectos."); setLoading(false); }
    }, 600);
  };

  const inp = {width:"100%",background:"#0d0d18",border:"1px solid #1e1e2e",borderRadius:10,
    padding:"11px 14px",color:"#fff",fontSize:13,outline:"none"};

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"#0a0a0f",padding:20}}>
      <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:22,padding:"40px 32px",
        width:"100%",maxWidth:380,boxShadow:"0 40px 80px rgba(0,0,0,.7)"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
          <div style={{width:36,height:36,borderRadius:9,background:"linear-gradient(135deg,#fe2c55,#25f4ee)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:17}}>T</div>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:21,letterSpacing:-.5}}>
            ik<span style={{color:"#fe2c55"}}>Panel</span>
          </span>
        </div>
        <p style={{color:"#555",fontSize:12,marginBottom:22}}>Panel de control para TikTok LIVE</p>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",color:"#555",fontSize:9,fontWeight:700,letterSpacing:.8,
            textTransform:"uppercase",marginBottom:6}}>Correo</label>
          <input value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&go()} type="email" placeholder="tu@correo.com" style={inp}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",color:"#555",fontSize:9,fontWeight:700,letterSpacing:.8,
            textTransform:"uppercase",marginBottom:6}}>Contraseña</label>
          <input value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&go()} type="password" placeholder="••••••••" style={inp}/>
        </div>
        {err && (
          <div style={{background:"rgba(254,44,85,.08)",border:"1px solid rgba(254,44,85,.2)",
            borderRadius:8,padding:"8px 12px",color:"#fe2c55",fontSize:12,marginBottom:12}}>{err}</div>
        )}
        <button onClick={go} disabled={loading}
          style={{width:"100%",background:loading?"#1e1e2e":"linear-gradient(135deg,#fe2c55,#ff6b81)",
            border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
          {loading ? "Verificando..." : "Ingresar →"}
        </button>
      </div>
    </div>
  );
}

  const [tUser,  setTUser]  = useState(() => ld("tuser", ""));

  const [conn2,  setConn2]  = useState(false);
  const wakeLockRef = React.useRef(null);
  const [wakeLockOn, setWakeLockOn] = React.useState(false);

  // ── Wake Lock: mantener pantalla encendida ──────────────────────────────
  const requestWakeLock = React.useCallback(async () => {
    if (!('wakeLock' in navigator)) return; // no soportado
    try {
      if (wakeLockRef.current) return; // ya activo
      wakeLockRef.current = await navigator.wakeLock.request('screen');
      setWakeLockOn(true);
      console.log('🔆 Wake Lock activo — pantalla no se apagará');
      wakeLockRef.current.addEventListener('release', () => {
        wakeLockRef.current = null;
        setWakeLockOn(false);
        console.log('Wake Lock liberado');
      });
    } catch(e) { console.warn('Wake Lock error:', e.message); }
  }, []);

  const releaseWakeLock = React.useCallback(async () => {
    if (wakeLockRef.current) {
      await wakeLockRef.current.release();
      wakeLockRef.current = null;
      setWakeLockOn(false);
    }
  }, []);

  // Activar Wake Lock cuando la página vuelve a ser visible (ej: cambiar app y volver)
  React.useEffect(() => {
    const onVisible = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
    document.addEventListener('visibilitychange', onVisible);
    requestWakeLock(); // activar al cargar
    return () => { document.removeEventListener('visibilitychange', onVisible); releaseWakeLock(); };

          setElVoices([...DEF_VOICES_EL, ...m.filter(v=>!DEF_VOICES_EL.find(x=>x.id===v.id))]);
          setElOk(true);
        }
      })
      .catch(() => setElOk(false));
  }, [ttsMode]);

  // Dots animación conectando
  useEffect(() => {
    if (!conn2) return;
    const t = setInterval(()=>setDots(d=>d.length>=3?"":d+"."), 400);
    return () => clearInterval(t);
  }, [conn2]);

  /* ─── Disparar acción ──────────────────────────── */
  const fireAction = useCallback((eventType, giftName="", nickname="", giftCount=1) => {
    if (!alertsOnR.current) return;
    const acts = actsR.current.filter(a => a.enabled && a.event===eventType);
    for (const act of acts) {
      if (act.event==="Gift Alert") {
        const gn=(giftName||"").toLowerCase();
        const an=(act.giftName||"").toLowerCase();
        if (an!=="cualquier regalo" && !gn.includes(an) && !an.includes(gn)) continue;
        if (giftCount < act.minCount) continue;
      }
      // Sonido MP3 (base64 persistido)
      if (act.soundData) {
        playAudio(act.soundData, ttsVolR.current/100);
      }
      // TTS
      if (act.ttsOn && act.ttsText && ttsOnR.current) {
        const rawText = act.ttsText.replace(/@usuario/gi, nickname);
        const text = filterText(rawText, blockedWordsR.current);
        if (text) {
          if (ttsModeR.current === "elevenlabs") {
            enqueueTTS(text, ttsVoiceR.current, ttsVolR.current/100, "elevenlabs");
          } else if (ttsModeR.current === "google") {
            enqueueTTS(text, googleVoiceR.current, ttsVolR.current/100, "google");
          } else {
            enqueueTTS(text, nativeVoiceR.current, ttsVolR.current/100, "native");
          }
        }
      }
    }
  }, []);

  /* ─── Socket.IO ────────────────────────────────── */
  useEffect(() => {
    const sock = io(SERVER, {
      transports: ["websocket"],
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1500,
      reconnectionDelayMax: 8000,
      timeout: 12000,
    });

    sock.on("connect", () => {
      console.log("Socket conectado:", sock.id);
    });

    sock.on("connect_error", (e) => {
      console.warn("Socket error:", e.message);
    });

    sock.on("event", d => {
      if (d.type==="chat") {
        setLog(p=>[{t:"msg",tx:`💬 @${d.nickname||d.user}: ${d.comment}`},...p].slice(0,50));
        setStats(p=>({...p, messages:p.messages+1}));
        if (ttsOnR.current && shouldReadUser(d, filterAllR, filterFollowR, filterModR, filterSuperFanR, filterFanClubR, filterFanLevelR, customUsersR)) {
          const tpl = ttsChatTplR.current || "{nickname} dice {message}";
          const rawText = applyTpl(tpl, {username:d.user||"", nickname:d.nickname||d.user||"", message:d.comment||""});
          const text = filterText(rawText, blockedWordsR.current);
          if (text) {
            const vp = ttsModeR.current==="elevenlabs"?ttsVoiceR.current:ttsModeR.current==="google"?googleVoiceR.current:nativeVoiceR.current;
            enqueueTTS(text, vp, ttsVolR.current/100, ttsModeR.current);
          }
        }
      } else if (d.type==="gift") {
        setLog(p=>[{t:"gift",tx:`🎁 @${d.nickname||d.user} → ${d.giftCount}× ${d.giftName}`},...p].slice(0,50));
        setStats(p=>({...p, gifts:p.gifts+1}));
        if (ttsOnR.current && ttsReadGiftR.current) {
          const tpl = ttsGiftTplR.current || "{username} envió {giftName} x{repeatCount}";
          const rawText = applyTpl(tpl, {
            username: d.user||"", nickname: d.nickname||d.user||"",
            giftName: d.giftName||"", repeatCount: d.giftCount||1,
            totalValue: d.diamondCount||0,
          });
          const text = filterText(rawText, blockedWordsR.current);
          if (text) {
            const vp = ttsModeR.current==="elevenlabs"?ttsVoiceR.current:ttsModeR.current==="google"?googleVoiceR.current:nativeVoiceR.current;
            enqueueTTS(text, vp, ttsVolR.current/100, ttsModeR.current);
          }
        }
        const dm = d.diamondCount||0;
        setTotDia(p=>p+dm);
        setTapR(prev=>{
          const ex=prev.find(u=>u.user===d.user);
          const upd=ex?prev.map(u=>u.user===d.user?{...u,diamonds:u.diamonds+dm,gifts:u.gifts+1}:u)
            :[...prev,{user:d.user,nickname:d.nickname||d.user,diamonds:dm,gifts:1}];
          return upd.sort((a,b)=>b.diamonds-a.diamonds).slice(0,10);
        });
        fireAction("Gift Alert", d.giftName, d.nickname||d.user, d.giftCount);
      } else if (d.type==="follow") {
        setLog(p=>[{t:"follow",tx:`➕ @${d.nickname||d.user} te siguió`},...p].slice(0,50));
        setStats(p=>({...p, follows:p.follows+1}));
        if (ttsOnR.current && ttsReadFollowR.current) {
          const tpl = ttsFollowTplR.current || "{username} te siguió";
          const rawText = applyTpl(tpl, {username:d.user||"", nickname:d.nickname||d.user||""});
          const text = filterText(rawText, blockedWordsR.current);
          if (text) {
            const vp = ttsModeR.current==="elevenlabs"?ttsVoiceR.current:ttsModeR.current==="google"?googleVoiceR.current:nativeVoiceR.current;
            enqueueTTS(text, vp, ttsVolR.current/100, ttsModeR.current);
          }
        }
        fireAction("Follow Alert","", d.nickname||d.user);
      } else if (d.type==="like") {
        // likeCount = cantidad de likes enviados en este batch por el usuario
        // NO acumular por usuario — cada evento ya representa likes nuevos
        const lc = d.likeCount || 1;
        setLog(p=>[{t:"like",tx:`❤️ ×${lc} likes de @${d.nickname||d.user}`},...p].slice(0,50));
        setStats(p=>({...p, likes:p.likes+lc}));
        setTotLike(p=>p+lc);
        setLAnim(true); setTimeout(()=>setLAnim(false),300);
        const hid=Date.now();
        setFh(p=>[...p,{id:hid,x:Math.random()*60+20}]);
        setTimeout(()=>setFh(p=>p.filter(h=>h.id!==hid)),1200);
        setLikeR(prev=>{
          const ex=prev.find(u=>u.user===d.user);
          const nickname = d.nickname || d.user;
          const upd=ex?prev.map(u=>u.user===d.user?{...u,count:u.count+lc,nickname}:u)
            :[...prev,{user:d.user,nickname,count:lc}];
          return upd.sort((a,b)=>b.count-a.count).slice(0,10);
        });
        fireAction("Like Alert","", d.nickname||d.user);
      } else if (d.type==="sub") {
        setLog(p=>[{t:"sub",tx:`⭐ @${d.nickname||d.user} se suscribió`},...p].slice(0,50));
        if (ttsOnR.current && ttsReadSuperFanR.current) {
          const tpl = ttsSuperFanTplR.current || "{username} se hizo super fan";
          const rawText = applyTpl(tpl, {username:d.user||"", nickname:d.nickname||d.user||""});
          const text = filterText(rawText, blockedWordsR.current);
          if (text) {
            const vp = ttsModeR.current==="elevenlabs"?ttsVoiceR.current:ttsModeR.current==="google"?googleVoiceR.current:nativeVoiceR.current;
            enqueueTTS(text, vp, ttsVolR.current/100, ttsModeR.current);
          }
        }
        fireAction("Sub Alert","", d.nickname||d.user);
      } else if (d.type==="share") {
        setLog(p=>[{t:"share",tx:`📤 @${d.nickname||d.user} compartió`},...p].slice(0,50));
        if (ttsOnR.current && ttsReadShareR.current) {
          const tpl = ttsShareTplR.current || "{username} compartió el live";
          const rawText = applyTpl(tpl, {username:d.user||"", nickname:d.nickname||d.user||""});
          const text = filterText(rawText, blockedWordsR.current);
          if (text) {
            const vp = ttsModeR.current==="elevenlabs"?ttsVoiceR.current:ttsModeR.current==="google"?googleVoiceR.current:nativeVoiceR.current;
            enqueueTTS(text, vp, ttsVolR.current/100, ttsModeR.current);
          }
        }
        fireAction("Share Alert","", d.nickname||d.user);
      }
    });

    sock.on("viewers", d => {
      setStats(p=>({...p, viewers:d.count||0}));
      // topViewers = lista de espectadores activos ahora
      if (Array.isArray(d.topViewers) && d.topViewers.length > 0) {
        setTopViewers(d.topViewers);
      }
    });
    sock.on("member", d => {
      if (!d.user) return;
      if (ttsOnR.current && ttsReadJoinR.current) {
        const tpl = ttsJoinTplR.current || "{username} se unió al live";
        const rawText = applyTpl(tpl, {username:d.user||"", nickname:d.nickname||d.user||""});
        const text = filterText(rawText, blockedWordsR.current);
        if (text) {
          const vp = ttsModeR.current==="elevenlabs"?ttsVoiceR.current:ttsModeR.current==="google"?googleVoiceR.current:nativeVoiceR.current;
          enqueueTTS(text, vp, ttsVolR.current/100, ttsModeR.current);
        }
      }
      // Agregar al historial de quienes entraron
      setViewR(prev => {
        const ex = prev.find(u => u.user === d.user);
        if (ex) {
          // actualizar timestamp
          return prev.map(u => u.user===d.user ? {...u, joinTime:d.timestamp||Date.now()} : u);
        }
        const upd = [{user:d.user, nickname:d.nickname||d.user, joinTime:d.timestamp||Date.now()}, ...prev];
        return upd.slice(0, 300);
      });
    });
    sock.on("battle", d => {
      if (d && d.teams) {
        const normalized = {
          ...d,
          ownerUsername: (d.ownerUsername || tUser || "").toLowerCase().replace(/^@/,""),
          teams: d.teams.map(t => ({
            hostName:     t.hostName     || t.uniqueId  || t.displayId  || "?",
            hostNickname: t.hostNickname || t.nickname  || t.hostName   || "?",
            userId:       t.userId || "",
            points:       Number(t.points || t.battleScore || t.score || 0),
          })).filter(t => t.hostName !== "?"),
        };
        setBattle(normalized);
      } else {
        setBattle(null); // null limpia el estado
      }
    });

    // Limpiar batalla al reconectar (nueva sesión)
    sock.on("battle_reset", () => setBattle(null));

    // Pedir la última batalla conocida al conectar (carga instantánea sin esperar evento)
    const savedUser = ld("tuser", "");
    if (savedUser) sock.emit("get_battle", { username: savedUser });

    sock.on("tiktok_disconnected", d => {
      setConn(false);
      setLog(p=>[{t:"sys",tx:`⚠️ TikTok desconectado (@${d?.username||"?"}). Reconecta.`},...p].slice(0,50));
    });
    sock.on("tiktok_error", d => {
      setLog(p=>[{t:"sys",tx:`⚠️ Error: ${d.message}`},...p].slice(0,50));
    });

    return () => sock.disconnect();
  }, [fireAction]);

  useEffect(() => {

    fetch(`${SERVER}/status/${encodeURIComponent(savedUser)}`)
      .then(r => r.json())
      .then(d => {
        if (d.connected) {
          setConn(true);
          setLog([{t:"sys",tx:`✅ Sesión restaurada @${savedUser}`}]);
        }
      })
      .catch(() => {});
  }, []); // eslint-disable-line

  /* ─── Conectar/Desconectar TikTok ──────────────── */
  const connect = async () => {

    setConn2(true); setConnErr("");
    try {
      const r = await fetch(`${SERVER}/connect`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({username: tUser.trim()}),
      });
      const d = await r.json();
      if (d.success) {
        setConn2(false); setConn(true);
        setStats({viewers:0,gifts:0,follows:0,messages:0,likes:0});
        setTotDia(0); setTotLike(0); setTapR([]); setLikeR([]);
        setBattle(null);
        likeUserMapR.current = {}; // reset delta tracker
        setViewR([]); sv("viewR",[]);
        setLog([{t:"sys",tx:`✅ Conectado a @${tUser}`}]);
      } else {
        setConn2(false);
        setConnErr(d.error||"¿Estás en LIVE?");
        setLog(p=>[{t:"sys",tx:`⚠️ ${d.error||"¿Estás en LIVE?"}`},...p]);
      }
    } catch(e) {
      setConn2(false);
      setConnErr("Sin respuesta del servidor");
      setLog(p=>[{t:"sys",tx:"⚠️ Sin respuesta del servidor"},...p]);
    }
  };

  const disconnect = async () => {
    await fetch(`${SERVER}/disconnect`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:tUser})}).catch(()=>{});
    setConn(false);
    setLog([]); setStats({viewers:0,gifts:0,follows:0,messages:0,likes:0});
    setTotDia(0); setTotLike(0);
  };

  /* ─── Acciones CRUD ─────────────────────────────── */

                      {/* Porcentajes debajo */}
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                        <span style={{fontSize:10,color:C[0],fontWeight:800}}>{pct0}%</span>
                        <span style={{fontSize:9,color:"#333",fontWeight:600}}>{(p0+p1).toLocaleString()} total</span>
                        <span style={{fontSize:10,color:C[1],fontWeight:800}}>{pct1}%</span>
                      </div>

                      {/* Quién va ganando */}
                      {diff>0&&(
                        <div style={{textAlign:"center",marginTop:10,
                          background:"rgba(255,255,255,.03)",borderRadius:8,padding:"7px 12px",fontSize:10,color:"#666"}}>
                          <span style={{color:w0?C[0]:C[1],fontWeight:700}}>@{getName(w0?t0:t1)}</span>
                          {" "}va ganando por{" "}
                          <span style={{color:"#fff",fontWeight:800}}>{diff.toLocaleString()}</span>
                        </div>
                      )}
                    </div>

                    {/* ── Cards individuales ── */}
                    <div style={{display:"flex",gap:8}}>
                      {[{t:t0,c:C[0],pct:pct0,bg:BG[0],w:w0,label:"Equipo A"},
                        {t:t1,c:C[1],pct:pct1,bg:BG[1],w:!w0,label:"Equipo B"}].map(({t,c,pct,bg,w,label},i)=>(
                        <div key={i} style={{flex:1,background:"#12121e",
                          border:`1px solid ${w?"rgba(255,215,0,.3)":"#1e1e2e"}`,
                          borderRadius:14,padding:"12px 10px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                            <div style={{width:30,height:30,borderRadius:"50%",background:bg,flexShrink:0,
                              display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#000"}}>
                              {i===0?"A":"B"}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontWeight:800,fontSize:10,color:c,
                                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>@{getName(t)}</div>
                              {w&&<div style={{fontSize:8,color:"#ffd700",fontWeight:700,marginTop:1}}>👑 Ganando</div>}
                            </div>
                          </div>
                          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:28,color:c,lineHeight:1,marginBottom:5}}>
                            {t.points.toLocaleString()}
                          </div>
                          <div style={{height:5,background:"#0a0a14",borderRadius:3,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${pct}%`,background:bg,
                              transition:"width 1.2s ease",borderRadius:3}}/>
                          </div>
                          <div style={{fontSize:8,color:"#444",marginTop:3,textAlign:"right",fontWeight:700}}>{pct}%</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()

              /* ── 3–4 participantes: individual con ranking ── */
              ):(()=>{
                const sorted=[...teams].sort((a,b)=>b.points-a.points);
                const winner=sorted[0];
                return(
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>

                    {/* ── Tabla de puntaje por anfitrión (estilo imagen) ── */}
                    <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:18,padding:16}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                        <span style={{fontSize:14}}>📊</span>
                        <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:11,
                          color:"#555",letterSpacing:1,textTransform:"uppercase"}}>Puntaje por anfitrión</span>
                      </div>
                      {teams.map((t,i)=>{
                        const pct=Math.round(t.points/totalPts*100);
                        const c=C[i]||"#888";
                        const bg=BG[i]||"linear-gradient(135deg,#333,#555)";
                        const isW=t===winner;
                        return(
                          <div key={i} style={{marginBottom:i<teams.length-1?14:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
                              {/* Dot de color */}
                              <div style={{width:10,height:10,borderRadius:"50%",background:c,flexShrink:0,
                                boxShadow:`0 0 6px ${c}66`}}/>
                              <div style={{fontWeight:800,fontSize:11,color:c,flex:1,minWidth:0,
                                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                {isW&&"👑 "}@{getName(t)}
                              </div>
                              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:22,color:c,flexShrink:0,lineHeight:1}}>
                                {t.points.toLocaleString()}
                              </div>
                            </div>
                            <div style={{height:8,background:"#0a0a14",borderRadius:4,overflow:"hidden",marginLeft:19}}>
                              <div style={{height:"100%",width:`${pct}%`,background:bg,
                                transition:"width 1.2s cubic-bezier(.4,0,.2,1)",borderRadius:4}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    {/* ── Cards individuales en grid ── */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {teams.map((t,i)=>{
                        const pct=Math.round(t.points/totalPts*100);
                        const c=C[i]||"#888";
                        const bg=BG[i]||"linear-gradient(135deg,#333,#555)";
                        const rank=sorted.indexOf(t)+1;
                        const isW=rank===1;
                        return(
                          <div key={i} style={{background:"#12121e",
                            border:`1px solid ${isW?"rgba(255,215,0,.3)":"#1e1e2e"}`,
                            borderRadius:14,padding:"12px 10px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                              <div style={{width:26,height:26,borderRadius:"50%",background:bg,flexShrink:0,
                                display:"flex",alignItems:"center",justifyContent:"center",
                                fontSize:11,fontWeight:900,color:"#000"}}>
                                {rank===1?"👑":rank}
                              </div>
                              <div style={{fontWeight:800,fontSize:10,color:c,flex:1,minWidth:0,
                                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                @{getName(t)}
                              </div>
                            </div>
                            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:26,color:c,lineHeight:1,marginBottom:5}}>
                              {t.points.toLocaleString()}
                            </div>
                            <div style={{height:5,background:"#0a0a14",borderRadius:3,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${pct}%`,background:bg,
                                transition:"width 1.2s ease",borderRadius:3}}/>
                            </div>
                            <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                              <span style={{fontSize:8,color:"#333",fontWeight:700}}>Equipo {String.fromCharCode(65+i)}</span>
                              <span style={{fontSize:8,color:"#444",fontWeight:700}}>{pct}%</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    {/* Diferencias */}
                    {winner&&teams.length>1&&(
                      <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:12,
                        padding:"10px 14px",textAlign:"center",fontSize:10,color:"#555"}}>
                        <span style={{color:C[0],fontWeight:700}}>@{getName(winner)}</span>
                        {" "}va ganando por{" "}
                        <span style={{color:"#fff",fontWeight:800}}>
                          {(winner.points-(sorted[1]?.points||0)).toLocaleString()}
                        </span>
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* Timestamp */}
              {battle?.timestamp&&(
                <div style={{textAlign:"center",color:"#1e1e2e",fontSize:9,marginTop:10}}>
                  ⏱ {new Date(battle.timestamp).toLocaleTimeString()}
                </div>
              )}
            </div>
            );
          })()}


          {/* ── ESPECTADORES ── */}
          {tab==="espect" && (
            <div className="ai">
              {/* Contador total */}
              <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:14,
                padding:14,marginBottom:12,display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontSize:28}}>👁️</div>
                <div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:32,
                    color:"#25f4ee",lineHeight:1}}>{stats.viewers.toLocaleString()}</div>
                  <div style={{color:"#444",fontSize:9,fontWeight:700,marginTop:3,letterSpacing:.5}}>
                    ESPECTADORES AHORA
                  </div>
                </div>
                <div style={{marginLeft:"auto",textAlign:"right"}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:"#fff"}}>
                    {viewR.length.toLocaleString()}
                  </div>
                  <div style={{color:"#444",fontSize:9,fontWeight:600}}>entraron al live</div>
                </div>
              </div>

              {/* Sub-tabs espectadores */}
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {[
                  {id:"historial", label:`📋 Entradas al live (${viewR.length})`},
                  {id:"activos",   label:`👁 Top activos (${stats.viewers})`},
                ].map(t => (
                  <button key={t.id} onClick={()=>setVTab(t.id)}
                    style={{flex:1,background:vTab===t.id?"rgba(37,244,238,.1)":"transparent",
                      border:`1px solid ${vTab===t.id?"rgba(37,244,238,.3)":"#1e1e2e"}`,
                      borderRadius:8,padding:"8px 6px",
                      color:vTab===t.id?"#25f4ee":"#555",
                      fontWeight:vTab===t.id?700:500,fontSize:11,cursor:"pointer"}}>
                    {t.label}
                  </button>
                ))}
              </div>

              {/* Lista espectadores */}
              <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:14,overflow:"hidden"}}>
                <div style={{background:"#0d0d18",borderBottom:"1px solid #1e1e2e",
                  padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#363655",fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>
                    {vTab==="activos" ? "👁️ Espectadores activos" : "📋 Quienes entraron al live"}
                  </span>
                  {vTab==="historial" && viewR.length > 0 && (
                    <button onClick={()=>{setViewR([]);sv("viewR",[]);}}
                      style={{background:"transparent",border:"1px solid #252535",borderRadius:5,
                        padding:"2px 8px",color:"#555",fontSize:9,cursor:"pointer"}}>
                      Limpiar
                    </button>
                  )}
                </div>

                {!conn ? (
                  <div style={{textAlign:"center",padding:"30px 16px",color:"#333",fontSize:11}}>
                    Conecta tu LIVE para ver espectadores
                  </div>
                ) : (vTab==="activos" ? topViewers : viewR).length === 0 ? (
                  <div style={{textAlign:"center",padding:"30px 16px",color:"#444",fontSize:11}}>
                    <div style={{fontSize:28,marginBottom:8}}>👁️</div>
                    {vTab==="activos"
                      ? "Los activos aparecen con el evento roomUser del live..."
                      : "Esperando que entren espectadores..."}
                  </div>
                ) : (
                  <div style={{maxHeight:460,overflowY:"auto"}}>
                    {(vTab==="activos" ? topViewers : viewR).map((item, i) => (
                      <div key={item.user||i} style={{display:"flex",alignItems:"center",gap:10,
                        padding:"9px 12px",borderBottom:"1px solid #0f0f1a"}}>
                        {/* Avatar con inicial */}
                        <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,
                          background:i===0?"linear-gradient(135deg,#ffd700,#ffaa00)":
                                     i===1?"linear-gradient(135deg,#c0c0c0,#888)":
                                     i===2?"linear-gradient(135deg,#cd7f32,#a05020)":
                                     "linear-gradient(135deg,#1e1e2e,#2a2a3a)",
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:i<3?15:11,fontWeight:800,
                          color:i<3?"#000":"#888"}}>
                          {i===0?"🥇":i===1?"🥈":i===2?"🥉":((item.nickname||"?")[0].toUpperCase())}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#fff",
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            @{item.nickname}
                          </div>
                          {item.joinTime && (
                            <div style={{fontSize:9,color:"#555",marginTop:1}}>
                              ⏱ {new Date(item.joinTime).toLocaleTimeString()}
                            </div>
                          )}
                          {(item.viewers||0) > 0 && (
                            <div style={{fontSize:9,color:"#25f4ee",marginTop:1}}>
                              👁 {item.viewers.toLocaleString()}
                            </div>
                          )}
                        </div>
                        <div style={{fontSize:10,color:"#444",flexShrink:0,
                          fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
                          #{i+1}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>{/* /contenido */}
      </div>{/* /main */}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
