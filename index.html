/* ─── TTS ENGINE ────────────────────────────────────────
   Prioridad: ElevenLabs → Web Speech API (gratis, nativo)
   Cola única — nunca se traba aunque falle EL              */
const ttsQueue  = [];
let   ttsActive = false;

function enqueueTTS(text, voiceId, vol, mode) {
  if (!text || !text.trim()) return;
  ttsQueue.push({ text: text.trim(), voiceId, vol, mode });
  if (!ttsActive) drainQueue();
}

async function drainQueue() {
  if (ttsQueue.length === 0) { ttsActive = false; return; }
  ttsActive = true;
  const item = ttsQueue.shift();
  try {
    if (item.mode === "elevenlabs") {
      await speakElevenLabs(item.text, item.voiceId, item.vol);
    } else {
      await speakNative(item.text, item.voiceId, item.vol);
    }
  } catch(e) {
    console.warn("TTS falló, siguiente:", e.message);
  }
  // Siempre continuar la cola
  setTimeout(drainQueue, 50);
}

async function speakElevenLabs(text, voiceId, vol) {
  const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
    method: "POST",
    headers: { "xi-api-key": EL_KEY, "Content-Type": "application/json", "Accept": "audio/mpeg" },
    body: JSON.stringify({ text, model_id: "eleven_multilingual_v2", voice_settings:{ stability:0.5, similarity_boost:0.75 } }),
    signal: AbortSignal.timeout(10000),
  });
  if (!r.ok) throw new Error("EL HTTP " + r.status);
  const blob = await r.blob();
  const url  = URL.createObjectURL(blob);
  await playAudio(url, vol);
  URL.revokeObjectURL(url);
}

function speakNative(text, voiceId, vol) {
  return new Promise((res) => {
    if (!window.speechSynthesis) { res(); return; }
    window.speechSynthesis.cancel();
    const utt   = new SpeechSynthesisUtterance(text);
    utt.volume  = Math.min(1, Math.max(0, vol));
    utt.rate    = 1.05;
    utt.pitch   = 1;
    utt.lang    = "es-MX";
    // intentar usar la voz del sistema por nombre si se guardó
    const voices = window.speechSynthesis.getVoices();
    const match  = voices.find(v => v.name === voiceId || v.lang.startsWith("es"));
    if (match) utt.voice = match;
    utt.onend   = res;
    utt.onerror = res;
    window.speechSynthesis.speak(utt);
    // timeout de seguridad: 15s max por utterance
    setTimeout(res, 15000);
  });
}

function playAudio(src, vol) {
  return new Promise((res) => {
    const a    = new Audio(src);
    a.volume   = Math.min(1, Math.max(0, vol));
    a.onended  = res;
    a.onerror  = res;
    a.play().catch(res);
    setTimeout(res, 30000); // max 30s
  });
}

/* ─── Conversión base64 para persistir audio ──────── */
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

    const file = e.target.files[0];

    setBusy(true);

      const data = await fileToBase64(file);
      set("soundData", data);
      set("soundName", file.name);
    } catch(err) { alert("Error al leer el archivo"); }
    setBusy(false);

      else { setErr("Correo o contraseña incorrectos."); setLoading(false); }
    }, 600);
  };

  const inp = {width:"100%",background:"#0d0d18",border:"1px solid #1e1e2e",borderRadius:10,
    padding:"11px 14px",color:"#fff",fontSize:13,outline:"none"};

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"#0a0a0f",padding:20}}>
      <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:22,padding:"40px 32px",
        width:"100%",maxWidth:380,boxShadow:"0 40px 80px rgba(0,0,0,.7)"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
          <div style={{width:36,height:36,borderRadius:9,background:"linear-gradient(135deg,#fe2c55,#25f4ee)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:17}}>T</div>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:21,letterSpacing:-.5}}>
            ik<span style={{color:"#fe2c55"}}>Panel</span>
          </span>
        </div>
        <p style={{color:"#555",fontSize:12,marginBottom:22}}>Panel de control para TikTok LIVE</p>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",color:"#555",fontSize:9,fontWeight:700,letterSpacing:.8,
            textTransform:"uppercase",marginBottom:6}}>Correo</label>
          <input value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&go()} type="email" placeholder="tu@correo.com" style={inp}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",color:"#555",fontSize:9,fontWeight:700,letterSpacing:.8,
            textTransform:"uppercase",marginBottom:6}}>Contraseña</label>
          <input value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&go()} type="password" placeholder="••••••••" style={inp}/>
        </div>
        {err && (
          <div style={{background:"rgba(254,44,85,.08)",border:"1px solid rgba(254,44,85,.2)",
            borderRadius:8,padding:"8px 12px",color:"#fe2c55",fontSize:12,marginBottom:12}}>{err}</div>
        )}
        <button onClick={go} disabled={loading}
          style={{width:"100%",background:loading?"#1e1e2e":"linear-gradient(135deg,#fe2c55,#ff6b81)",
            border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
          {loading ? "Verificando..." : "Ingresar →"}
        </button>
      </div>
    </div>
  );
}

/* ─── Pantalla principal ────────────────────────────── */
function App() {
  const [user,   setUser]   = useState(() => ld("session", null));
  const [tab,    setTab]    = useState(() => ld("tab", "dashboard"));
  const [sb,     setSb]     = useState(false);

  // Batalla / Versus
  const [battle, setBattle] = useState(null);
  const [battleRaw, setBattleRaw] = useState(null); // debug raw

  // Conexión TikTok
  const [tUser,  setTUser]  = useState(() => ld("tuser", ""));
  const [conn,   setConn]   = useState(false);
  const [conn2,  setConn2]  = useState(false);
  const wakeLockRef = React.useRef(null);
  const [wakeLockOn, setWakeLockOn] = React.useState(false);

  // ── Wake Lock: mantener pantalla encendida ──────────────────────────────
  const requestWakeLock = React.useCallback(async () => {
    if (!('wakeLock' in navigator)) return; // no soportado
    try {
      if (wakeLockRef.current) return; // ya activo
      wakeLockRef.current = await navigator.wakeLock.request('screen');
      setWakeLockOn(true);
      console.log('🔆 Wake Lock activo — pantalla no se apagará');
      wakeLockRef.current.addEventListener('release', () => {
        wakeLockRef.current = null;
        setWakeLockOn(false);
        console.log('Wake Lock liberado');
      });
    } catch(e) { console.warn('Wake Lock error:', e.message); }
  }, []);

  const releaseWakeLock = React.useCallback(async () => {
    if (wakeLockRef.current) {
      await wakeLockRef.current.release();
      wakeLockRef.current = null;
      setWakeLockOn(false);
    }
  }, []);

  // Activar Wake Lock cuando la página vuelve a ser visible (ej: cambiar app y volver)
  React.useEffect(() => {
    const onVisible = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
    document.addEventListener('visibilitychange', onVisible);
    requestWakeLock(); // activar al cargar
    return () => { document.removeEventListener('visibilitychange', onVisible); releaseWakeLock(); };
  }, [requestWakeLock, releaseWakeLock]);
  const [dots,   setDots]   = useState("");
  const [connErr,setConnErr]= useState("");

  // Stats
  const [stats,  setStats]  = useState({viewers:0, gifts:0, follows:0, messages:0, likes:0});
  const [log,    setLog]    = useState([]);
  const [lAnim,  setLAnim]  = useState(false);
  const [fh,     setFh]     = useState([]);
  const [totDia, setTotDia] = useState(() => ld("totDia", 0));
  const [totLike,setTotLike]= useState(() => ld("totLike", 0));
  const [tapR,   setTapR]   = useState(() => ld("tapR", []));
  const [likeR,  setLikeR]  = useState(() => ld("likeR", []));
  const [viewR,  setViewR]  = useState(() => ld("viewR", [])); // historial de entradas
  const [topViewers, setTopViewers] = useState([]); // espectadores activos ahora
  const [vTab, setVTab] = useState("historial"); // sub-tab espectadores

  // TTS settings
  const [ttsMode,  setTtsMode]  = useState(() => ld("ttsMode", "native"));   // "native" | "elevenlabs"
  const [ttsOn,    setTtsOn]    = useState(() => ld("ttsOn", true));
  const [ttsVol,   setTtsVol]   = useState(() => ld("ttsVol", 80));
  const [ttsVoice, setTtsVoice] = useState(() => ld("ttsVoice", "cgSgspJ2msm6clMCkdW9")); // EL voice ID
  const [nativeVoices, setNativeVoices] = useState([]);
  const [nativeVoice,  setNativeVoice]  = useState(() => ld("nativeVoice", ""));
  const [elVoices, setElVoices] = useState(DEF_VOICES_EL);
  const [elOk,     setElOk]     = useState(null); // null=sin probar, true=ok, false=error

  // Refs (para callbacks que no re-renderizan)
  const ttsOnR    = useRef(ttsOn);
  const ttsVolR   = useRef(ttsVol);
  const ttsModeR  = useRef(ttsMode);
  const ttsVoiceR = useRef(ttsVoice);
  const nativeVoiceR = useRef(nativeVoice);
  const actsR     = useRef([]);
  const likeUserMapR = useRef({}); // user -> last known totalLikeCount
  const alertsOnR = useRef(true);

  // Acciones
  const [actions,   setActions]   = useState(() => ld("actions4", DEF_ACTIONS));
  const [alertsOn,  setAlertsOn]  = useState(() => ld("alertsOn", true));
  const [showM,     setShowM]     = useState(false);
  const [editA,     setEditA]     = useState(null);
  const [searchQ,   setSearchQ]   = useState("");
  const [toast,     setToast]     = useState("");
  const [delConfirm,setDelConfirm]= useState(null); // id acción a confirmar delete

  // UI
  const showT = (msg) => { setToast(msg); setTimeout(()=>setToast(""), 2500); };

  // Sync refs
  useEffect(()=>{ ttsOnR.current=ttsOn;    sv("ttsOn",    ttsOn);    }, [ttsOn]);
  useEffect(()=>{ ttsVolR.current=ttsVol;  sv("ttsVol",   ttsVol);   }, [ttsVol]);
  useEffect(()=>{ ttsModeR.current=ttsMode;sv("ttsMode",  ttsMode);  }, [ttsMode]);
  useEffect(()=>{ ttsVoiceR.current=ttsVoice; sv("ttsVoice",ttsVoice);}, [ttsVoice]);
  useEffect(()=>{ nativeVoiceR.current=nativeVoice; sv("nativeVoice",nativeVoice);}, [nativeVoice]);
  useEffect(()=>{ actsR.current=actions;   sv("actions4", actions);  }, [actions]);
  useEffect(()=>{ alertsOnR.current=alertsOn; sv("alertsOn",alertsOn);}, [alertsOn]);
  useEffect(()=>{ sv("tab",   tab);   }, [tab]);
  useEffect(()=>{ sv("tuser", tUser); }, [tUser]);
  useEffect(()=>{ sv("totDia",  totDia);  }, [totDia]);
  useEffect(()=>{ sv("totLike", totLike); }, [totLike]);
  useEffect(()=>{ sv("tapR",    tapR);    }, [tapR]);
  useEffect(()=>{ sv("likeR",   likeR);   }, [likeR]);
  useEffect(()=>{ sv("viewR",   viewR);   }, [viewR]);

  // Cargar voces nativas del navegador
  useEffect(() => {
    const load = () => {
      const vs = window.speechSynthesis?.getVoices() || [];
      const esList = vs.filter(v => v.lang.startsWith("es") || v.lang.startsWith("en"));
      setNativeVoices(esList.length ? esList : vs);
      if (!nativeVoice && esList.length) {
        const def = esList.find(v=>v.lang.startsWith("es-MX")) || esList[0];
        if (def) { setNativeVoice(def.name); nativeVoiceR.current=def.name; }
      }
    };
    load();
    window.speechSynthesis?.addEventListener("voiceschanged", load);
    return () => window.speechSynthesis?.removeEventListener("voiceschanged", load);
  }, []);

  // Cargar voces ElevenLabs
  useEffect(() => {
    if (ttsMode !== "elevenlabs") return;
    fetch("https://api.elevenlabs.io/v1/voices", {headers:{"xi-api-key":EL_KEY}})
      .then(r=>r.json())
      .then(d => {
        if (d.voices?.length) {
          const m = d.voices.map(v=>({id:v.voice_id, name:v.name}));
          setElVoices([...DEF_VOICES_EL, ...m.filter(v=>!DEF_VOICES_EL.find(x=>x.id===v.id))]);
          setElOk(true);
        }
      })
      .catch(() => setElOk(false));
  }, [ttsMode]);

  // Dots animación conectando
  useEffect(() => {
    if (!conn2) return;
    const t = setInterval(()=>setDots(d=>d.length>=3?"":d+"."), 400);
    return () => clearInterval(t);
  }, [conn2]);

  /* ─── Disparar acción ──────────────────────────── */
  const fireAction = useCallback((eventType, giftName="", nickname="", giftCount=1) => {
    if (!alertsOnR.current) return;
    const acts = actsR.current.filter(a => a.enabled && a.event===eventType);
    for (const act of acts) {
      if (act.event==="Gift Alert") {
        const gn=(giftName||"").toLowerCase();
        const an=(act.giftName||"").toLowerCase();
        if (an!=="cualquier regalo" && !gn.includes(an) && !an.includes(gn)) continue;
        if (giftCount < act.minCount) continue;
      }
      // Sonido MP3 (base64 persistido)
      if (act.soundData) {
        playAudio(act.soundData, ttsVolR.current/100);
      }
      // TTS
      if (act.ttsOn && act.ttsText && ttsOnR.current) {
        const text = act.ttsText.replace(/@usuario/gi, nickname);
        if (ttsModeR.current === "elevenlabs") {
          enqueueTTS(text, ttsVoiceR.current, ttsVolR.current/100, "elevenlabs");
        } else {
          enqueueTTS(text, nativeVoiceR.current, ttsVolR.current/100, "native");
        }
      }
    }
  }, []);

  /* ─── Socket.IO ────────────────────────────────── */
  useEffect(() => {
    const sock = io(SERVER, {
      transports: ["websocket"],
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1500,
      reconnectionDelayMax: 8000,
      timeout: 12000,
    });

    sock.on("connect", () => {
      console.log("Socket conectado:", sock.id);
    });

    sock.on("connect_error", (e) => {
      console.warn("Socket error:", e.message);
    });

    sock.on("event", d => {
      if (d.type==="chat") {
        setLog(p=>[{t:"msg",tx:`💬 @${d.nickname||d.user}: ${d.comment}`},...p].slice(0,50));
        setStats(p=>({...p, messages:p.messages+1}));
        if (ttsOnR.current) {
          const text = `${d.nickname||d.user} dice: ${d.comment}`;
          if (ttsModeR.current==="elevenlabs") {
            enqueueTTS(text, ttsVoiceR.current, ttsVolR.current/100, "elevenlabs");
          } else {
            enqueueTTS(text, nativeVoiceR.current, ttsVolR.current/100, "native");
          }
        }
      } else if (d.type==="gift") {
        setLog(p=>[{t:"gift",tx:`🎁 @${d.nickname||d.user} → ${d.giftCount}× ${d.giftName}`},...p].slice(0,50));
        setStats(p=>({...p, gifts:p.gifts+1}));
        const dm = d.diamondCount||0;
        setTotDia(p=>p+dm);
        setTapR(prev=>{
          const ex=prev.find(u=>u.user===d.user);
          const upd=ex?prev.map(u=>u.user===d.user?{...u,diamonds:u.diamonds+dm,gifts:u.gifts+1}:u)
            :[...prev,{user:d.user,nickname:d.nickname||d.user,diamonds:dm,gifts:1}];
          return upd.sort((a,b)=>b.diamonds-a.diamonds).slice(0,10);
        });
        fireAction("Gift Alert", d.giftName, d.nickname||d.user, d.giftCount);
      } else if (d.type==="follow") {
        setLog(p=>[{t:"follow",tx:`➕ @${d.nickname||d.user} te siguió`},...p].slice(0,50));
        setStats(p=>({...p, follows:p.follows+1}));
        fireAction("Follow Alert","", d.nickname||d.user);
      } else if (d.type==="like") {
        // likeCount = cantidad de likes enviados en este batch por el usuario
        // NO acumular por usuario — cada evento ya representa likes nuevos
        const lc = d.likeCount || 1;
        setLog(p=>[{t:"like",tx:`❤️ ×${lc} likes de @${d.nickname||d.user}`},...p].slice(0,50));
        setStats(p=>({...p, likes:p.likes+lc}));
        setTotLike(p=>p+lc);
        setLAnim(true); setTimeout(()=>setLAnim(false),300);
        const hid=Date.now();
        setFh(p=>[...p,{id:hid,x:Math.random()*60+20}]);
        setTimeout(()=>setFh(p=>p.filter(h=>h.id!==hid)),1200);
        setLikeR(prev=>{
          const ex=prev.find(u=>u.user===d.user);
          const nickname = d.nickname || d.user;
          const upd=ex?prev.map(u=>u.user===d.user?{...u,count:u.count+lc,nickname}:u)
            :[...prev,{user:d.user,nickname,count:lc}];
          return upd.sort((a,b)=>b.count-a.count).slice(0,10);
        });
        fireAction("Like Alert","", d.nickname||d.user);
      } else if (d.type==="sub") {
        setLog(p=>[{t:"sub",tx:`⭐ @${d.nickname||d.user} se suscribió`},...p].slice(0,50));
        fireAction("Sub Alert","", d.nickname||d.user);
      } else if (d.type==="share") {
        setLog(p=>[{t:"share",tx:`📤 @${d.nickname||d.user} compartió`},...p].slice(0,50));
        fireAction("Share Alert","", d.nickname||d.user);
      }
    });

    sock.on("viewers", d => {
      setStats(p=>({...p, viewers:d.count||0}));
      // topViewers = acumular todos los activos vistos (TikTok envía hasta 50 por evento)
      if (Array.isArray(d.topViewers) && d.topViewers.length > 0) {
        setTopViewers(prev => {
          const map = new Map(prev.map(v => [v.user, v]));
          d.topViewers.forEach(v => { if (v.user && v.user !== "?") map.set(v.user, v); });
          return [...map.values()].sort((a,b) => (b.viewers||0)-(a.viewers||0));
        });
      }
    });
    sock.on("member", d => {
      if (!d.user) return;
      // Agregar al historial de quienes entraron
      setViewR(prev => {
        const ex = prev.find(u => u.user === d.user);
        if (ex) {
          // actualizar timestamp
          return prev.map(u => u.user===d.user ? {...u, joinTime:d.timestamp||Date.now()} : u);
        }
        const upd = [{user:d.user, nickname:d.nickname||d.user, joinTime:d.timestamp||Date.now()}, ...prev];
        return upd.slice(0, 300);
      });
    });
    sock.on("battle", d => {
      if (d && d.teams) {
        const normalized = {
          ...d,
          // ownerUsername: usar el que manda el servidor o el usuario conectado como fallback
          ownerUsername: (d.ownerUsername || tUser || "").toLowerCase().replace(/^@/,""),
          teams: d.teams.map(t => ({
            hostName:     t.hostName     || t.uniqueId  || t.displayId  || "?",
            hostNickname: t.hostNickname || t.nickname  || t.hostName   || "?",
            points:       Number(t.points || t.battleScore || t.score || 0),
          })).filter(t => t.hostName !== "?"),
        };
        setBattle(normalized);
      } else {
        setBattle(d);
      }
    });

    sock.on("tiktok_disconnected", d => {
      setConn(false);
      setLog(p=>[{t:"sys",tx:`⚠️ TikTok desconectado (@${d?.username||"?"}). Reconecta.`},...p].slice(0,50));
    });
    sock.on("tiktok_error", d => {
      setLog(p=>[{t:"sys",tx:`⚠️ Error: ${d.message}`},...p].slice(0,50));
    });

    return () => sock.disconnect();
  }, [fireAction]);

  /* ─── Restaurar estado conexión al recargar ─────── */
  useEffect(() => {
    const savedUser = ld("tuser", "");
    if (!savedUser) return;
    // Verificar si el servidor aún tiene la sesión activa
    fetch(`${SERVER}/status/${encodeURIComponent(savedUser)}`)
      .then(r => r.json())
      .then(d => {
        if (d.connected) {
          setConn(true);
          setLog([{t:"sys",tx:`✅ Sesión restaurada @${savedUser}`}]);
        }
      })
      .catch(() => {});
  }, []); // eslint-disable-line

  /* ─── Reset likeUserMap al conectar ─────────────── */
  // (se hace en connect() limpiando el ref)

  /* ─── Conectar/Desconectar TikTok ──────────────── */
  const connect = async () => {
    if (!tUser.trim()) return;
    setConn2(true); setConnErr("");
    try {
      const r = await fetch(`${SERVER}/connect`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({username: tUser.trim()}),
      });
      const d = await r.json();
      if (d.success) {
        setConn2(false); setConn(true);
        setStats({viewers:0,gifts:0,follows:0,messages:0,likes:0});
        setTopViewers([]);
        setTotDia(0); setTotLike(0); setTapR([]); setLikeR([]);
        setBattle(null);
        likeUserMapR.current = {}; // reset delta tracker
        setViewR([]); sv("viewR",[]);
        setLog([{t:"sys",tx:`✅ Conectado a @${tUser}`}]);
      } else {
        setConn2(false);
        setConnErr(d.error||"¿Estás en LIVE?");
        setLog(p=>[{t:"sys",tx:`⚠️ ${d.error||"¿Estás en LIVE?"}`},...p]);
      }
    } catch(e) {
      setConn2(false);
      setConnErr("Sin respuesta del servidor");
      setLog(p=>[{t:"sys",tx:"⚠️ Sin respuesta del servidor"},...p]);
    }
  };

  const disconnect = async () => {
    await fetch(`${SERVER}/disconnect`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:tUser})}).catch(()=>{});
    setConn(false);
    setLog([]); setStats({viewers:0,gifts:0,follows:0,messages:0,likes:0});
    setTotDia(0); setTotLike(0);
  };

  /* ─── Acciones CRUD ─────────────────────────────── */
  const saveAction = (form) => {
    if (form.id && actions.find(a=>a.id===form.id)) {
      setActions(p=>p.map(a=>a.id===form.id?form:a));
      showT("✅ Acción actualizada");
    } else {
      setActions(p=>[...p, {...form, id:Date.now()}]);
      showT("✅ Acción creada");
    }
    setShowM(false); setEditA(null);
  };

  const deleteAction = (id) => {
    setActions(p=>p.filter(a=>a.id!==id));
    setDelConfirm(null);
    showT("🗑️ Acción eliminada");
  };

  const testAction = (act) => {
    if (act.soundData) playAudio(act.soundData, ttsVol/100);
    if (act.ttsOn && act.ttsText) {
      const text = act.ttsText.replace(/@usuario/gi,"UsuarioPrueba");
      enqueueTTS(text, ttsMode==="elevenlabs"?ttsVoice:nativeVoice, ttsVol/100, ttsMode);
    }
    showT(`▶ Probando: ${act.name}`);
  };

  /* ─── Render helpers ────────────────────────────── */
  if (!user) return <Login onLogin={u=>{sv("session",u);setUser(u);}}/>;

  const TABS = [
    {id:"dashboard", icon:"⚡", l:"Dashboard"},
    {id:"acciones",  icon:"🎬", l:"Acciones"},
    {id:"tts",       icon:"🔊", l:"Voz & Audio"},
    {id:"ranking",   icon:"🏆", l:"Ranking"},
    {id:"chat",      icon:"💬", l:"Chat"},
    {id:"batalla",   icon:"⚔️",  l:"Batalla"},
    {id:"espect",    icon:"👁️", l:"Espectadores"},
  ];

  const LC = {gift:"rgba(254,44,85,.08)",follow:"rgba(37,244,238,.08)",msg:"rgba(255,255,255,.02)",
    like:"rgba(254,44,85,.05)",sub:"rgba(139,92,246,.08)",share:"rgba(255,255,255,.04)",sys:"rgba(37,244,238,.06)"};
  const LB = {gift:"#fe2c55",follow:"#25f4ee",msg:"#2a2a3a",like:"#fe2c55",sub:"#8b5cf6",share:"#666",sys:"#25f4ee"};
  const bCls = ev=>ev.startsWith("Follow")?"bf":ev.startsWith("Gift")?"bg":ev.startsWith("Like")?"bl":ev.startsWith("Sub")?"bs":"bsh";
  const bIco = ev=>ev.startsWith("Follow")?"➕":ev.startsWith("Gift")?"🎁":ev.startsWith("Like")?"❤️":ev.startsWith("Sub")?"⭐":"📤";

  const C   = {background:"#12121e",border:"1px solid #1e1e2e",borderRadius:14,padding:15,marginBottom:12};
  const lbl = {display:"block",color:"#556",fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:5};
  const inp = {width:"100%",background:"#0a0a0f",border:"1px solid #252535",borderRadius:8,padding:"9px 12px",color:"#fff",fontSize:12,outline:"none"};

  const fActs = actions.filter(a=>a.name.toLowerCase().includes(searchQ.toLowerCase()));

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#0a0a0f"}}>

      {/* Modales */}
      {showM && (
        <ActModal
          action={editA}
          ttsMode={ttsMode}
          ttsVoiceId={ttsVoice}
          ttsNativeVoice={nativeVoice}
          vol={ttsVol}
          onSave={saveAction}
          onClose={()=>{setShowM(false);setEditA(null);}}
        />
      )}

      {/* Confirm delete */}
      {delConfirm && (
        <div className="mo" onClick={()=>setDelConfirm(null)}>

              </div>

              {[
                {title:"🎁 Top Tap Tap", data:tapR, key:"diamonds", color:"#ffd700", icon:"💎", empty:"Esperando regalos..."},
                {title:"❤️ Top Likes",   data:likeR,key:"count",   color:"#fe2c55", icon:"❤️", empty:"Esperando likes..."},
              ].map(({title,data,key,color,icon,empty})=>(
                <div key={title} style={C}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,marginBottom:11}}>
                    {title}
                  </div>
                  {data.length===0
                    ? <div style={{textAlign:"center",padding:"18px 0",color:"#333",fontSize:11}}>
                        {conn ? empty : "Conecta tu LIVE"}
                      </div>
                    : data.map((item,i)=>{
                        const medals=["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣","8️⃣","9️⃣","🔟"];
                        const max=data[0][key]||1;
                        const pct=Math.round((item[key]/max)*100);
                        return (
                          <div key={item.user} style={{marginBottom:8}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                              <span style={{fontSize:13,flexShrink:0}}>{medals[i]||"·"}</span>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                  <span style={{color:"#fff",fontSize:11,fontWeight:700,
                                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                    @{item.nickname}
                                  </span>
                                  <span style={{color,fontWeight:800,fontSize:11,flexShrink:0,marginLeft:6}}>
                                    {icon} {item[key].toLocaleString()}
                                  </span>
                                </div>
                                <div style={{height:3,background:"#1a1a28",borderRadius:2,
                                  marginTop:3,overflow:"hidden"}}>
                                  <div style={{height:"100%",width:`${pct}%`,borderRadius:2,
                                    transition:"width .6s",
                                    background:key==="count"
                                      ?"linear-gradient(90deg,#fe2c55,#ff6b81)"
                                      :i===0?"linear-gradient(90deg,#ffd700,#ffaa00)"
                                      :i===1?"linear-gradient(90deg,#ccc,#888)":"#2a2a3a"}}/>
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })
                  }
                </div>
              ))}
            </div>
          )}

          {/* ── CHAT ── */}
          {tab==="chat" && (
            <div className="ai">
              <div style={C}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,marginBottom:10}}>
                  💬 Chat en vivo
                </div>
                <div style={{background:"#0a0a0f",borderRadius:8,padding:8,
                  height:400,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>
                  {log.filter(l=>l.t==="msg").length===0
                    ? <div style={{color:"#333",fontSize:11,textAlign:"center",marginTop:170}}>
                        {conn ? "Esperando mensajes..." : "Conecta tu LIVE"}
                      </div>
                    : log.filter(l=>l.t==="msg").map((item,i)=>(
                        <div key={i} style={{fontSize:12,padding:"5px 8px",borderRadius:5,
                          background:"rgba(255,255,255,.02)",borderLeft:"2px solid #252535",color:"#ffffff",fontWeight:500}}>
                          {item.tx}
                        </div>
                      ))
                  }
                </div>
              </div>
            </div>
          )}


          {/* ── BATALLA / VERSUS ── */}
          {tab==="batalla" && (
            <div className="ai">
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,marginBottom:14,
                display:"flex",alignItems:"center",gap:8}}>
                ⚔️ Batalla en vivo
                {battle && battle.status===1 && (
                  <span className="ld" style={{width:7,height:7,borderRadius:"50%",
                    background:"#fe2c55",boxShadow:"0 0 8px #fe2c55",display:"inline-block"}}/>
                )}
              </div>

              {!conn ? (
                <div style={{textAlign:"center",padding:"40px 0",color:"#333",fontSize:12}}>
                  Conecta tu LIVE para ver la batalla
                </div>
              ) : !battle ? (
                <div style={{textAlign:"center",padding:"30px 0",color:"#444",fontSize:12}}>
                  <div style={{fontSize:36,marginBottom:12}}>⚔️</div>
                  Esperando batalla...<br/>
                  <span style={{fontSize:10,color:"#333"}}>
                    La batalla aparece automáticamente cuando el LIVE inicia un versus
                  </span>
                </div>
              ) : (
                <div>
                  {/* Estado */}
                  <div style={{textAlign:"center",marginBottom:14}}>
                    <span style={{background:battle.status===1?"rgba(254,44,85,.12)":"rgba(37,244,238,.1)",
                      border:`1px solid ${battle.status===1?"rgba(254,44,85,.3)":"rgba(37,244,238,.3)"}`,
                      borderRadius:20,padding:"4px 14px",fontSize:10,fontWeight:800,
                      color:battle.status===1?"#fe2c55":"#25f4ee",letterSpacing:1}}>
                      {battle.status===1?"🔴 EN CURSO":"✅ FINALIZADA"}
                    </span>
                  </div>

                  {battle.teams && battle.teams.length >= 2 ? (() => {
                    const owner = (battle.ownerUsername || "").toLowerCase().replace(/^@/,"");
                    const isNumeric = s => /^\d{8,}$/.test(s||"");
                    const getName = t => {
                      const nn = t.hostNickname||""; const hn = t.hostName||"";
                      if (!isNumeric(nn)) return nn;
                      if (!isNumeric(hn)) return hn;
                      return nn || hn;
                    };

                    const teams = battle.teams;
                    const totalPts = teams.reduce((s,t) => s + t.points, 0) || 1;

                    // ── Detectar si es 2v2 (4 equipos con labels A1,A2,B1,B2)
                    // o simplemente N participantes individuales
                    const is4way = teams.length >= 4;

                    if (is4way) {
                      // Ordenar por puntos desc para mostrar ranking
                      const sorted = [...teams].sort((a,b) => b.points - a.points);
                      const COLORS = ["#fe2c55","#25f4ee","#a78bfa","#fbbf24","#34d399","#f97316"];
                      const maxPts = sorted[0]?.points || 1;

                      return (
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {/* Header */}
                          <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:14,padding:"12px 14px"}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                              <span style={{fontSize:11,fontWeight:800,color:"#fff"}}>🏆 {teams.length} participantes</span>
                              <span style={{fontSize:9,color:"#555"}}>{totalPts.toLocaleString()} puntos totales</span>
                            </div>
                            {/* Barra apilada con todos */}
                            <div style={{height:10,borderRadius:5,background:"#0d0d18",overflow:"hidden",display:"flex"}}>
                              {sorted.map((t,i) => {
                                const pct = Math.round(t.points / totalPts * 100);
                                return <div key={i} style={{height:"100%",width:`${pct}%`,background:COLORS[i%COLORS.length],transition:"width 1s ease"}}/>;
                              })}
                            </div>
                          </div>

                          {/* Cards individuales — RANKING */}
                          {sorted.map((t,i) => {
                            const nm = getName(t);
                            const c  = COLORS[i % COLORS.length];
                            const pct = Math.round(t.points / totalPts * 100);
                            const barPct = Math.round(t.points / maxPts * 100);
                            return (
                              <div key={i} style={{background:"#12121e",
                                border:`1px solid ${i===0?"rgba(255,215,0,.3)":"#1e1e2e"}`,
                                borderRadius:13,padding:"11px 13px"}}>
                                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                                  <span style={{fontSize:i===0?18:14,flexShrink:0}}>
                                    {i===0?"👑":i===1?"🥈":i===2?"🥉":(i+1)+"."}
                                  </span>
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontWeight:800,fontSize:12,color:c,
                                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                      @{nm}
                                    </div>
                                  </div>
                                  <div style={{textAlign:"right",flexShrink:0}}>
                                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:24,color:c,lineHeight:1}}>
                                      {t.points.toLocaleString()}
                                    </div>
                                    <div style={{fontSize:9,color:"#555"}}>pts · {pct}%</div>
                                  </div>
                                </div>
                                <div style={{height:5,background:"#0d0d18",borderRadius:3,overflow:"hidden"}}>
                                  <div style={{height:"100%",width:`${barPct}%`,borderRadius:3,
                                    transition:"width 1s ease",background:`linear-gradient(90deg,${c},${c}55)`}}/>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    }

                    // ── Batalla 1v1 (2 equipos) — lógica original mejorada ──
                    const ownerTeamIdx = teams.findIndex(t => {
                      const hn = (t.hostName||"").toLowerCase().replace(/^@/,"");
                      const nn = (t.hostNickname||"").toLowerCase().replace(/^@/,"");
                      return owner && (hn===owner || nn===owner || hn.includes(owner) || owner.includes(hn));
                    });
                    const idx0 = ownerTeamIdx >= 0 ? ownerTeamIdx : 0;
                    const idx1 = idx0 === 0 ? 1 : 0;
                    const t0 = teams[idx0];
                    const t1 = teams[idx1];
                    const total2 = (t0.points + t1.points) || 1;
                    const pct0 = Math.round(t0.points / total2 * 100);
                    const pct1 = 100 - pct0;
                    const win0 = t0.points >= t1.points;
                    const win1 = !win0;
                    const name0 = getName(t0);
                    const name1 = getName(t1);

                    return (
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:16,padding:16}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                            <div style={{flex:1,textAlign:"left",minWidth:0}}>
                              <span style={{fontSize:11,fontWeight:800,color:"#fe2c55",wordBreak:"break-all",lineHeight:1.3}}>
                                @{name0}
                              </span>
                            </div>
                            <div style={{flexShrink:0,padding:"0 5px"}}>
                              <span style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:13,color:"#333",letterSpacing:2}}>VS</span>
                            </div>
                            <div style={{flex:1,textAlign:"right",minWidth:0}}>
                              <span style={{fontSize:11,fontWeight:800,color:"#25f4ee",wordBreak:"break-all",lineHeight:1.3}}>
                                @{name1}
                              </span>
                            </div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                            <div style={{textAlign:"left"}}>
                              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:40,color:"#fe2c55",lineHeight:1}}>
                                {t0.points.toLocaleString()}
                              </div>
                              <div style={{fontSize:10,color:"#fe2c5570",fontWeight:700}}>{pct0}%</div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:40,color:"#25f4ee",lineHeight:1}}>
                                {t1.points.toLocaleString()}
                              </div>
                              <div style={{fontSize:10,color:"#25f4ee70",fontWeight:700}}>{pct1}%</div>
                            </div>
                          </div>
                          <div style={{height:12,borderRadius:6,background:"#0d0d18",overflow:"hidden",display:"flex"}}>
                            <div style={{height:"100%",width:`${pct0}%`,background:"linear-gradient(90deg,#fe2c55,#ff6b81)",transition:"width 1s ease"}}/>
                            <div style={{height:"100%",width:`${pct1}%`,background:"linear-gradient(90deg,#0ea5e9,#25f4ee)",transition:"width 1s ease"}}/>
                          </div>
                        </div>
                        {[{team:t0,c:"#fe2c55",pct:pct0,isWin:win0,nm:name0},
                          {team:t1,c:"#25f4ee",pct:pct1,isWin:win1,nm:name1}].map(({team,c,pct,isWin,nm},i) => (
                          <div key={i} style={{background:"#12121e",
                            border:`1px solid ${isWin?"rgba(255,215,0,.25)":"#1e1e2e"}`,
                            borderRadius:13,padding:13}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                              {isWin && <span style={{fontSize:16}}>👑</span>}
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontWeight:800,fontSize:12,color:c,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                  @{nm}
                                </div>
                              </div>
                              <div style={{textAlign:"right",flexShrink:0}}>
                                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:28,color:c,lineHeight:1}}>
                                  {team.points.toLocaleString()}
                                </div>
                                <div style={{fontSize:9,color:"#555",fontWeight:600}}>puntos</div>
                              </div>
                            </div>
                            <div style={{height:5,background:"#0d0d18",borderRadius:3,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${pct}%`,borderRadius:3,
                                transition:"width 1s ease",
                                background:`linear-gradient(90deg,${c},${c}55)`}}/>
                            </div>
                            <div style={{fontSize:9,color:"#444",marginTop:3,textAlign:"right"}}>
                              {pct}% del total
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })() : battle.teams && battle.teams.length === 1 ? (
                    <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:13,padding:14}}>
                      <div style={{fontWeight:800,fontSize:13,color:"#fe2c55",marginBottom:6}}>
                        @{battle.teams[0].hostNickname||battle.teams[0].hostName}
                      </div>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:32,color:"#fe2c55"}}>
                        {battle.teams[0].points.toLocaleString()}
                      </div>
                      <div style={{fontSize:9,color:"#555",marginTop:4}}>Esperando oponente...</div>
                    </div>
                  ) : (
                    <div style={{textAlign:"center",color:"#444",fontSize:11,padding:"20px 0"}}>
                      Sin datos de equipos aún...
                    </div>
                  )}

                                    {/* Última actualización */}
                  {battle.timestamp && (
                    <div style={{textAlign:"center",color:"#333",fontSize:9,marginTop:12}}>
                      Actualizado: {new Date(battle.timestamp).toLocaleTimeString()}
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* ── ESPECTADORES ── */}
          {tab==="espect" && (
            <div className="ai">
              {/* Contador total */}
              <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:14,
                padding:14,marginBottom:12,display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontSize:28}}>👁️</div>
                <div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:32,
                    color:"#25f4ee",lineHeight:1}}>{stats.viewers.toLocaleString()}</div>
                  <div style={{color:"#444",fontSize:9,fontWeight:700,marginTop:3,letterSpacing:.5}}>
                    ESPECTADORES AHORA
                  </div>
                </div>
                <div style={{marginLeft:"auto",textAlign:"right"}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:"#fff"}}>
                    {viewR.length.toLocaleString()}
                  </div>
                  <div style={{color:"#444",fontSize:9,fontWeight:600}}>entraron al live</div>
                </div>
              </div>

              {/* Sub-tabs espectadores */}
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {[
                  {id:"historial", label:`📋 Entradas al live (${viewR.length})`},
                  {id:"activos",   label:`👁 Top activos (${topViewers.length})`},
                ].map(t => (
                  <button key={t.id} onClick={()=>setVTab(t.id)}
                    style={{flex:1,background:vTab===t.id?"rgba(37,244,238,.1)":"transparent",
                      border:`1px solid ${vTab===t.id?"rgba(37,244,238,.3)":"#1e1e2e"}`,
                      borderRadius:8,padding:"8px 6px",
                      color:vTab===t.id?"#25f4ee":"#555",
                      fontWeight:vTab===t.id?700:500,fontSize:11,cursor:"pointer"}}>
                    {t.label}
                  </button>
                ))}
              </div>

              {/* Lista espectadores */}
              <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:14,overflow:"hidden"}}>
                <div style={{background:"#0d0d18",borderBottom:"1px solid #1e1e2e",
                  padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#363655",fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>
                    {vTab==="activos" ? "👁️ Espectadores activos" : "📋 Quienes entraron al live"}
                  </span>
                  {vTab==="historial" && viewR.length > 0 && (
                    <button onClick={()=>{setViewR([]);sv("viewR",[]);}}
                      style={{background:"transparent",border:"1px solid #252535",borderRadius:5,
                        padding:"2px 8px",color:"#555",fontSize:9,cursor:"pointer"}}>
                      Limpiar
                    </button>
                  )}
                </div>

                {!conn ? (
                  <div style={{textAlign:"center",padding:"30px 16px",color:"#333",fontSize:11}}>
                    Conecta tu LIVE para ver espectadores
                  </div>
                ) : (vTab==="activos" ? topViewers : viewR).length === 0 ? (
                  <div style={{textAlign:"center",padding:"30px 16px",color:"#444",fontSize:11}}>
                    <div style={{fontSize:28,marginBottom:8}}>👁️</div>
                    {vTab==="activos"
                      ? "Los activos aparecen con el evento roomUser del live..."
                      : "Esperando que entren espectadores..."}
                  </div>
                ) : (
                  <div style={{maxHeight:460,overflowY:"auto"}}>
                    {(vTab==="activos" ? topViewers : viewR).map((item, i) => (
                      <div key={item.user||i} style={{display:"flex",alignItems:"center",gap:10,
                        padding:"9px 12px",borderBottom:"1px solid #0f0f1a"}}>
                        {/* Avatar con inicial */}
                        <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,
                          background:i===0?"linear-gradient(135deg,#ffd700,#ffaa00)":
                                     i===1?"linear-gradient(135deg,#c0c0c0,#888)":
                                     i===2?"linear-gradient(135deg,#cd7f32,#a05020)":
                                     "linear-gradient(135deg,#1e1e2e,#2a2a3a)",
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:i<3?15:11,fontWeight:800,
                          color:i<3?"#000":"#888"}}>
                          {i===0?"🥇":i===1?"🥈":i===2?"🥉":((item.nickname||"?")[0].toUpperCase())}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#fff",
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            @{item.nickname}
                          </div>
                          {item.joinTime && (
                            <div style={{fontSize:9,color:"#555",marginTop:1}}>
                              ⏱ {new Date(item.joinTime).toLocaleTimeString()}
                            </div>
                          )}
                          {(item.viewers||0) > 0 && (
                            <div style={{fontSize:9,color:"#25f4ee",marginTop:1}}>
                              👁 {item.viewers.toLocaleString()}
                            </div>
                          )}
                        </div>
                        <div style={{fontSize:10,color:"#444",flexShrink:0,
                          fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
                          #{i+1}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>{/* /contenido */}
      </div>{/* /main */}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
