/* ─── TTS ENGINE ────────────────────────────────────
   Prioridad: ElevenLabs → Web Speech API             */
const ttsQueue = [];
let ttsActive = false;
let _synthKA = null; // keep-alive interval para Chrome/Android

function _startSynthKA() {
  if (_synthKA) return;
  _synthKA = setInterval(() => {
    if (window.speechSynthesis && window.speechSynthesis.speaking) {
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
  }, 8000);
}
function _stopSynthKA() {
  if (_synthKA) { clearInterval(_synthKA); _synthKA = null; }
}

function enqueueTTS(text, voiceId, vol, mode) {
  if (!text || !text.trim()) return;
  ttsQueue.push({ text: text.trim(), voiceId, vol, mode });
  if (!ttsActive) drainQueue();
}
async function drainQueue() {
  if (ttsQueue.length === 0) { ttsActive = false; _stopSynthKA(); return; }
  ttsActive = true;
  const item = ttsQueue.shift();
  try {
    if (item.mode === "elevenlabs") await speakElevenLabs(item.text, item.voiceId, item.vol);
    else await speakNative(item.text, item.voiceId, item.vol);
  } catch(e) { console.warn("TTS falló:", e.message); }
  setTimeout(drainQueue, 80);
}
async function speakElevenLabs(text, voiceId, vol) {
  const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
    method:"POST",
    headers:{"xi-api-key":EL_KEY,"Content-Type":"application/json","Accept":"audio/mpeg"},
    body:JSON.stringify({text, model_id:"eleven_multilingual_v2", voice_settings:{stability:0.5, similarity_boost:0.75}}),
    signal:AbortSignal.timeout(12000),
  });
  if (!r.ok) throw new Error("EL HTTP "+r.status);
  const blob = await r.blob();
  const url  = URL.createObjectURL(blob);
  await playAudio(url, vol);
  URL.revokeObjectURL(url);
}
function speakNative(text, voiceId, vol) {
  return new Promise((res) => {
    if (!window.speechSynthesis) { res(); return; }

    const doSpeak = () => {
      window.speechSynthesis.cancel();
      // Pequeña pausa para que cancel() surta efecto (bug Chrome)
      setTimeout(() => {
        const utt = new SpeechSynthesisUtterance(text);
        utt.volume = Math.min(1, Math.max(0, vol));
        utt.rate = 1.0; utt.pitch = 1; utt.lang = "es-MX";
        const voices = window.speechSynthesis.getVoices();
        // Priorizar voz en español, luego la guardada, luego cualquiera
        const match = voices.find(v => v.lang === "es-MX")
          || voices.find(v => v.lang.startsWith("es-"))
          || voices.find(v => v.name === voiceId)
          || voices.find(v => v.lang.startsWith("es"))
          || voices[0];
        if (match) utt.voice = match;

        let done = false;
        const finish = () => { if (!done) { done = true; res(); } };
        utt.onend = finish;
        utt.onerror = (e) => { console.warn("synth error:", e.error); finish(); };

        _startSynthKA(); // Keep-alive para que Chrome no se calle
        window.speechSynthesis.speak(utt);
        setTimeout(finish, 22000); // max 22s por utterance
      }, 120);
    };

    // Voces pueden no estar listas aún (primera carga en Android)
    const vv = window.speechSynthesis.getVoices();
    if (vv.length > 0) { doSpeak(); }
    else {
      window.speechSynthesis.addEventListener("voiceschanged", doSpeak, { once: true });
      setTimeout(doSpeak, 1500); // fallback si el evento no llega
    }
  });
}
function playAudio(src, vol) {
  return new Promise((res) => {
    const a = new Audio(src);
    a.volume = Math.min(1, Math.max(0, vol));
    a.onended = res; a.onerror = res;
    a.play().catch(res);
    setTimeout(res, 30000);
  });
}
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function ActModal({ action, ttsMode, ttsVoiceId, ttsNativeVoice, vol, onSave, onClose }) {

/* ─── Login ─────────────────────────────────────────── */
function Login({ onLogin }) {
  const [email,setEmail]=useState(""); const [pass,setPass]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  const go = () => {
    setErr(""); setLoading(true);
    setTimeout(()=>{ const u=USERS[email.toLowerCase()]; if(u&&u.password===pass){onLogin({...u,email});}else{setErr("Correo o contraseña incorrectos.");setLoading(false);} },600);
  };
  const inp = {width:"100%",background:"#0d0d18",border:"1px solid #1e1e2e",borderRadius:10,padding:"11px 14px",color:"#fff",fontSize:13,outline:"none"};
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a0f",padding:20}}>
      <div style={{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:22,padding:"40px 32px",width:"100%",maxWidth:380,boxShadow:"0 40px 80px rgba(0,0,0,.7)"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
          <div style={{width:36,height:36,borderRadius:9,background:"linear-gradient(135deg,#fe2c55,#25f4ee)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:17}}>T</div>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:21,letterSpacing:-.5}}>ik<span style={{color:"#fe2c55"}}>Panel</span></span>
        </div>
        <p style={{color:"#555",fontSize:12,marginBottom:22}}>Panel de control para TikTok LIVE</p>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",color:"#555",fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:6}}>Correo</label>
          <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} type="email" placeholder="tu@correo.com" style={inp}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",color:"#555",fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:6}}>Contraseña</label>
          <input value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} type="password" placeholder="••••••••" style={inp}/>
        </div>
        {err && <div style={{background:"rgba(254,44,85,.08)",border:"1px solid rgba(254,44,85,.2)",borderRadius:8,padding:"8px 12px",color:"#fe2c55",fontSize:12,marginBottom:12}}>{err}</div>}
        <button onClick={go} disabled={loading} style={{width:"100%",background:loading?"#1e1e2e":"linear-gradient(135deg,#fe2c55,#ff6b81)",border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
          {loading?"Verificando...":"Ingresar →"}
        </button>
      </div>
    </div>
  );
}

  // Wake Lock
  const wakeLockRef = useRef(null);
  const [wakeLockOn,setWakeLockOn] = useState(false);
  const requestWakeLock = useCallback(async()=>{
    if(!('wakeLock' in navigator))return;
    try{ if(wakeLockRef.current)return; wakeLockRef.current=await navigator.wakeLock.request('screen'); setWakeLockOn(true);
      wakeLockRef.current.addEventListener('release',()=>{wakeLockRef.current=null;setWakeLockOn(false);}); }
    catch(e){}
  },[]);
  const releaseWakeLock = useCallback(async()=>{
    if(wakeLockRef.current){await wakeLockRef.current.release();wakeLockRef.current=null;setWakeLockOn(false);}
  },[]);
  useEffect(()=>{
    const onV=()=>{ if(document.visibilityState==='visible')requestWakeLock(); };
    document.addEventListener('visibilitychange',onV); requestWakeLock();
    return()=>{document.removeEventListener('visibilitychange',onV);releaseWakeLock();};

      setNativeVoices(esList.length?esList:vs);
      if(!nativeVoice&&esList.length){

        if(def){setNativeVoice(def.name);nativeVoiceR.current=def.name;}

  const fireAction = useCallback((eventType, giftName="", nickname="", giftCount=1)=>{
    if(!alertsOnR.current)return;
    const acts=actsR.current.filter(a=>a.enabled&&a.event===eventType);
    for(const act of acts){
      if(act.event==="Gift Alert"){
        const gn=(giftName||"").toLowerCase(), an=(act.giftName||"").toLowerCase();
        if(an!=="cualquier regalo"&&!gn.includes(an)&&!an.includes(gn))continue;
        if(giftCount<act.minCount)continue;
      }
      if(act.soundData) playAudio(act.soundData, ttsVolR.current/100);
      if(act.ttsOn&&act.ttsText&&ttsOnR.current){
        const text=act.ttsText.replace(/@usuario/gi,nickname);
        if(ttsModeR.current==="elevenlabs") enqueueTTS(text,ttsVoiceR.current,ttsVolR.current/100,"elevenlabs");
        else enqueueTTS(text,nativeVoiceR.current,ttsVolR.current/100,"native");
      }
    }
    // También disparar configs de regalo individualmente
    const giftCfgsSnap = JSON.parse(localStorage.getItem("tp_giftConfigs")||"{}");
    const addedGiftsSnap = JSON.parse(localStorage.getItem("tp_addedGifts")||"[]");
    if(eventType==="Gift Alert"){
      for(const ag of addedGiftsSnap){
        const cfg = giftCfgsSnap[ag.id]||defGiftCfg();
        if(!cfg.enabled) continue;
        const gn=(giftName||"").toLowerCase(), an=(ag.name||"").toLowerCase();
        if(!gn.includes(an)&&!an.includes(gn)) continue;
        if(cfg.soundData) playAudio(cfg.soundData, cfg.volume/100);
        if(cfg.tts&&cfg.ttsTemplate&&ttsOnR.current){
          const text=cfg.ttsTemplate.replace(/{username}/gi,nickname).replace(/{giftName}/gi,giftName).replace(/{repeatCount}/gi,giftCount);
          if(ttsModeR.current==="elevenlabs") enqueueTTS(text,ttsVoiceR.current,cfg.volume/100,"elevenlabs");
          else enqueueTTS(text,nativeVoiceR.current,cfg.volume/100,"native");
        }
      }
    }
  },[]);

          }
        }
      } else if(d.type==="gift"){
        setLog(p=>[{t:"gift",tx:`🎁 @${d.nickname||d.user} → ${d.giftCount}× ${d.giftName}`},...p].slice(0,50));

        fireAction("Gift Alert",d.giftName,d.nickname||d.user,d.giftCount);
      } else if(d.type==="follow"){
        setLog(p=>[{t:"follow",tx:`➕ @${d.nickname||d.user} te siguió`},...p].slice(0,50));
        setStats(p=>({...p,follows:p.follows+1}));
        fireAction("Follow Alert","",d.nickname||d.user);
      } else if(d.type==="like"){
        const lc=d.likeCount||1;
        setLog(p=>[{t:"like",tx:`❤️ ×${lc} likes de @${d.nickname||d.user}`},...p].slice(0,50));
        setStats(p=>({...p,likes:p.likes+lc})); setTotLike(p=>p+lc);
        setLAnim(true);setTimeout(()=>setLAnim(false),300);
        const hid=Date.now(); setFh(p=>[...p,{id:hid,x:Math.random()*60+20}]); setTimeout(()=>setFh(p=>p.filter(h=>h.id!==hid)),1200);
        setLikeR(prev=>{const ex=prev.find(u=>u.user===d.user);const nickname=d.nickname||d.user;const upd=ex?prev.map(u=>u.user===d.user?{...u,count:u.count+lc,nickname}:u):[...prev,{user:d.user,nickname,count:lc}];return upd.sort((a,b)=>b.count-a.count).slice(0,10);});
        fireAction("Like Alert","",d.nickname||d.user);
      } else if(d.type==="sub"){
        setLog(p=>[{t:"sub",tx:`⭐ @${d.nickname||d.user} se suscribió`},...p].slice(0,50));
        fireAction("Sub Alert","",d.nickname||d.user);
      } else if(d.type==="share"){
        setLog(p=>[{t:"share",tx:`📤 @${d.nickname||d.user} compartió`},...p].slice(0,50));
        fireAction("Share Alert","",d.nickname||d.user);
      }
    });
    sock.on("viewers",d=>{
      setStats(p=>({...p,viewers:d.count||0}));
      if(Array.isArray(d.topViewers)&&d.topViewers.length>0) setTopViewers(d.topViewers.filter(v=>v.user&&v.user!=="?"));
    });
    sock.on("member",d=>{
      if(!d.user)return;
      setViewR(prev=>{const ex=prev.find(u=>u.user===d.user);if(ex)return prev.map(u=>u.user===d.user?{...u,joinTime:d.timestamp||Date.now()}:u);return [{user:d.user,nickname:d.nickname||d.user,joinTime:d.timestamp||Date.now()},...prev].slice(0,300);});
    });
    sock.on("battle",d=>{
      if(d&&d.teams){
        setBattle({...d,ownerUsername:(d.ownerUsername||tUser||"").toLowerCase().replace(/^@/,""),teams:d.teams.map(t=>({hostName:t.hostName||t.uniqueId||t.displayId||"?",hostNickname:t.hostNickname||t.nickname||t.hostName||"?",points:Number(t.points||t.battleScore||t.score||0)})).filter(t=>t.hostName!=="?")});
      } else setBattle(d);
    });
    sock.on("tiktok_disconnected",d=>{ setConn(false); setLog(p=>[{t:"sys",tx:`⚠️ TikTok desconectado (@${d?.username||"?"}). Reconecta.`},...p].slice(0,50)); });
    sock.on("tiktok_error",d=>{ setLog(p=>[{t:"sys",tx:`⚠️ Error: ${d.message}`},...p].slice(0,50)); });
    return()=>sock.disconnect();
  },[fireAction]);

                    {/* Barra global de equipo si es 2v2 */}
                    {is2v2 && (
                      <div style={{...C,marginBottom:10}}>
                        <div style={{fontSize:10,fontWeight:700,color:"#aaa",marginBottom:8,textAlign:"center",letterSpacing:1}}>PUNTOS POR EQUIPO</div>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                          <span style={{fontSize:12,fontWeight:800,color:"#fe2c55"}}>🔴 Equipo A · {totalA.toLocaleString()} 💎</span>
                          <span style={{fontSize:12,fontWeight:800,color:"#25f4ee"}}>💙 Equipo B · {totalB.toLocaleString()} 💎</span>
                        </div>
                        <div style={{height:10,background:"#1e1e2e",borderRadius:5,overflow:"hidden",display:"flex"}}>
                          <div style={{height:"100%",width:`${pctA}%`,background:"linear-gradient(90deg,#fe2c55,#ff6b81)",borderRadius:"5px 0 0 5px",transition:"width .6s ease"}}/>
                          <div style={{height:"100%",flex:1,background:"linear-gradient(90deg,#1a9ba0,#25f4ee)",borderRadius:"0 5px 5px 0"}}/>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                          <span style={{fontSize:9,color:"#fe2c55"}}>{pctA}%</span>
                          <span style={{fontSize:9,color:"#25f4ee"}}>{pctB}%</span>
                        </div>
                      </div>
                    )}

                    {/* Puntos individuales */}
                    {is2v2 ? (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                        {/* Columna Equipo A */}
                        <div>
                          <div style={{fontSize:9,fontWeight:800,color:"#fe2c55",letterSpacing:1,marginBottom:8,textAlign:"center"}}>🔴 EQUIPO A</div>
                          {teamA.map((t,i)=>renderPlayer(t,i,"#fe2c55"))}
                        </div>
                        {/* Columna Equipo B */}
                        <div>
                          <div style={{fontSize:9,fontWeight:800,color:"#25f4ee",letterSpacing:1,marginBottom:8,textAlign:"center"}}>💙 EQUIPO B</div>
                          {teamB.map((t,i)=>renderPlayer(t,i,"#25f4ee"))}
                        </div>
                      </div>
                    ) : (
                      <div style={C}>
                        <div style={{fontSize:11,fontWeight:700,color:"#fff",marginBottom:10}}>⚔️ Puntos individuales</div>
                        {teams.map((t,i)=>renderPlayer(t,i,i===0?"#fe2c55":"#25f4ee"))}
                      </div>
                    )}
                  </div>
                );
              })()}
            </div>
          )}

          {/* ══════════════════════════════════════════════════════
              TAB: ESPECTADORES
          ══════════════════════════════════════════════════════ */}
          {tab==="espect" && (
            <div className="ai">
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {["historial","activos"].map(t=>(
                  <button key={t} className={`mode-btn${vTab===t?" act":""}`} onClick={()=>setVTab(t)}>
                    {t==="historial"?"📋 Historial":"👁️ Activos ahora"}
                  </button>
                ))}
              </div>
              <div style={C}>
                {vTab==="historial" && (
                  viewR.length===0 ? <div style={{color:"#444",fontSize:11,textAlign:"center",padding:"16px 0"}}>{conn?"Sin entradas aún...":"Conecta el LIVE"}</div>
                  : viewR.map((u,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid #0f0f1a"}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:"#1e1e2e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#555",flexShrink:0}}>{(u.nickname||u.user)[0]?.toUpperCase()}</div>
                      <div style={{flex:1,fontSize:11,color:"#fff"}}>@{u.nickname||u.user}</div>
                      <div style={{fontSize:9,color:"#555"}}>{new Date(u.joinTime).toLocaleTimeString()}</div>
                    </div>
                  ))
                )}
                {vTab==="activos" && (
                  topViewers.length===0 ? <div style={{color:"#444",fontSize:11,textAlign:"center",padding:"16px 0"}}>{conn?"Sin espectadores activos...":"Conecta el LIVE"}</div>
                  : topViewers.map((u,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid #0f0f1a"}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:"#25f4ee",flexShrink:0}}/>
                      <div style={{flex:1,fontSize:11,color:"#fff"}}>@{u.nickname||u.user}</div>
                    </div>
                  ))
                )}
              </div>
            </div>
          )}

        </div>{/* fin content */}
      </div>{/* fin main */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
