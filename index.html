/* ─── TTS ENGINE — Cola robusta, nunca se traba ─
   - drainQueue usa recursión segura con setTimeout
   - speakNative tiene timeout de seguridad
   - speakElevenLabs tiene AbortSignal
   - Si falla cualquier elemento, continúa con el siguiente */

const ttsQ = [];
let ttsActive = false;

function enqueueTTS(text, voiceId, vol, mode) {
  if (!text || !text.trim()) return;
  // Evitar duplicados exactos consecutivos en chat (anti-spam)
  const last = ttsQ[ttsQ.length-1];
  if (last && last.text === text.trim()) return;
  ttsQ.push({ text: text.trim(), voiceId, vol: Math.min(1,Math.max(0,vol||0.8)), mode });
  if (!ttsActive) drainQueue();
}

function clearTTSQueue() {
  ttsQ.length = 0;
  ttsActive = false;
  try { window.speechSynthesis?.cancel(); } catch(e){}
}

async function drainQueue() {
  if (ttsQ.length === 0) { ttsActive = false; return; }
  ttsActive = true;
  const item = ttsQ.shift();
  try {
    if (item.mode === "elevenlabs") {
      await speakElevenLabs(item.text, item.voiceId, item.vol);
    } else {
      await speakNative(item.text, item.voiceId, item.vol);
    }
  } catch(e) {
    console.warn("[TTS] error, continuando cola:", e.message);
  }
  // Pausa mínima entre utterances para evitar que el synth se atasque
  setTimeout(drainQueue, 120);
}

async function speakElevenLabs(text, voiceId, vol) {
  const ctrl = new AbortController();
  const timeout = setTimeout(() => ctrl.abort(), 12000);
  try {
    const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
      method:"POST",
      headers:{"xi-api-key":EL_KEY,"Content-Type":"application/json","Accept":"audio/mpeg"},
      body:JSON.stringify({text,model_id:"eleven_multilingual_v2",voice_settings:{stability:0.5,similarity_boost:0.75}}),
      signal:ctrl.signal,
    });
    clearTimeout(timeout);
    if (!r.ok) throw new Error("EL HTTP "+r.status);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    await playAudio(url, vol);
    URL.revokeObjectURL(url);
  } catch(e) {
    clearTimeout(timeout);
    throw e;
  }
}

function speakNative(text, voiceId, vol) {
  return new Promise((res) => {
    if (!window.speechSynthesis) { res(); return; }
    // Cancelar cualquier utterance colgada antes de hablar
    window.speechSynthesis.cancel();

    // FIX Chrome: speechSynthesis se pausa en tabs de fondo.
    // Re-activar con pausa/resume periódico.
    const resumeHack = setInterval(() => {
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    }, 5000);

    const utt = new SpeechSynthesisUtterance(text);
    utt.volume = Math.min(1, Math.max(0, vol));
    utt.rate   = 1.05;
    utt.pitch  = 1;
    utt.lang   = "es-MX";

    const voices = window.speechSynthesis.getVoices();
    if (voiceId) {
      const byName = voices.find(v => v.name === voiceId);
      if (byName) utt.voice = byName;
      else {
        const esVoice = voices.find(v => v.lang.startsWith("es"));
        if (esVoice) utt.voice = esVoice;
      }
    } else {
      const esVoice = voices.find(v => v.lang.startsWith("es"));
      if (esVoice) utt.voice = esVoice;
    }

    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      clearInterval(resumeHack);
      res();
    };
    utt.onend   = finish;
    utt.onerror = finish;
    // Timeout de seguridad: máx 18s por utterance
    setTimeout(finish, 18000);

    try { window.speechSynthesis.speak(utt); } catch(e) { finish(); }
  });
}

function playAudio(src, vol) {
  return new Promise((res) => {
    try {
      const a = new Audio(src);
      a.volume = Math.min(1, Math.max(0, vol));
      a.onended = res;
      a.onerror = res;
      a.play().catch(res);
      setTimeout(res, 30000);
    } catch(e) { res(); }
  });
}

function fileToBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

        {/* Evento + Duración */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:12}}>

            <label style={lbl}>Evento</label>
            <select value={f.event} onChange={e=>set("event",e.target.value)} style={{...inp,cursor:"pointer"}}>

          </div>
          <div>
            <label style={lbl}>Duración (seg)</label>
            <input type="number" min="1" max="120" value={f.duration} onChange={e=>set("duration",Number(e.target.value))} style={inp}/>

        </div>

        {/* Regalo — con galería visual */}
        {f.event==="Gift Alert" && (
          <div style={{marginBottom:12}}>
            <label style={lbl}>Regalo de TikTok</label>

            {/* Preview del regalo seleccionado */}
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
              <div onClick={()=>setShowGallery(!showGallery)}
                style={{flex:1,background:"#080810",border:`1.5px solid ${showGallery?"rgba(254,44,85,.4)":"#1e1e35"}`,
                  borderRadius:10,padding:"9px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>

              <div>

                <input type="number" min="1" value={f.minCount} onChange={e=>set("minCount",Number(e.target.value))}

                    cursor:"pointer",border:`1.5px solid ${f.giftName==="cualquier regalo"?"rgba(37,244,238,.4)":"transparent"}`,
                    background:f.giftName==="cualquier regalo"?"rgba(37,244,238,.07)":"transparent",marginBottom:8}}>

              <div style={{fontSize:9,color:f.soundName?"rgba(37,244,238,.5)":"#444",marginTop:2}}>
                {f.soundName?"✓ Guardado · persiste al recargar":"MP3, WAV, OGG"}
              </div>
            </div>
            {f.soundData&&(
              <button onClick={e=>{e.preventDefault();e.stopPropagation();testSound();}}

                style={{background:"rgba(254,44,85,.07)",border:"1px solid rgba(254,44,85,.2)",
                  borderRadius:7,padding:"5px 9px",color:"#fe2c55",fontSize:10,fontWeight:700,

            <textarea value={f.ttsText} onChange={e=>set("ttsText",e.target.value)} disabled={!f.ttsOn}

              style={{width:"100%",background:"transparent",border:"none",padding:"9px 12px",
                color:f.ttsOn?"#fff":"#333",fontSize:12,outline:"none",resize:"vertical",minHeight:55,lineHeight:1.6}}/>
            {f.ttsOn&&f.ttsText&&(
              <div style={{borderTop:"1px solid #151525",padding:"6px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:9,color:"#444"}}>
                  Motor: <span style={{color:"#fe2c55"}}>{ttsMode==="elevenlabs"?"ElevenLabs":"Voz del navegador (gratis)"}</span>
                </span>
                <button onClick={testTTS}
                  style={{background:"rgba(254,44,85,.07)",border:"1px solid rgba(254,44,85,.2)",
                    borderRadius:6,padding:"4px 10px",color:"#fe2c55",fontSize:9,fontWeight:700,cursor:"pointer"}}>

          <div style={{color:"#444",fontSize:9,marginTop:4}}>
            💡 <span style={{color:"#25f4ee",fontFamily:"monospace"}}>@usuario</span> se reemplaza con el nombre real
          </div>
        </div>

        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose}
            style={{flex:1,background:"transparent",border:"1px solid #222235",borderRadius:9,
              padding:"10px",color:"#555",fontWeight:600,cursor:"pointer",fontSize:12}}>
            Cancelar
          </button>
          <button onClick={()=>{
            if(!f.name.trim()){alert("Ponle un nombre a la acción");return;}
            onSave({...f});

            style={{flex:2,background:"linear-gradient(135deg,#fe2c55,#ff6b81)",border:"none",
              borderRadius:9,padding:"10px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}}>
            💾 Guardar Acción

    </div>
  );
}

/* ─── Login ─────────────────────────────────────── */
function Login({ onLogin }) {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const go=()=>{
    setErr("");setLoading(true);
    setTimeout(()=>{
      const u=USERS[email.toLowerCase()];
      if(u&&u.password===pass){onLogin({...u,email});}
      else{setErr("Correo o contraseña incorrectos.");setLoading(false);}
    },550);
  };
  const inp={width:"100%",background:"#0a0a18",border:"1px solid #1a1a2e",borderRadius:10,padding:"11px 14px",color:"#fff",fontSize:13,outline:"none"};
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"#080810",padding:20,position:"relative",overflow:"hidden"}}>
      {/* Fondo decorativo */}
      <div style={{position:"absolute",width:500,height:500,borderRadius:"50%",
        background:"radial-gradient(circle,rgba(254,44,85,.12) 0%,transparent 70%)",
        top:"50%",left:"50%",transform:"translate(-50%,-50%)",pointerEvents:"none"}}/>
      <div style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderRadius:22,padding:"40px 32px",
        width:"100%",maxWidth:380,boxShadow:"0 40px 100px rgba(0,0,0,.8)",position:"relative",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
          <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#fe2c55,#25f4ee)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:18}}>T</div>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,letterSpacing:-.5}}>
            ik<span style={{color:"#fe2c55"}}>Panel</span>
          </span>
        </div>
        <p style={{color:"#444",fontSize:12,marginBottom:24}}>Panel de control para TikTok LIVE</p>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",color:"#446",fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:6}}>Correo</label>
          <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} type="email" placeholder="tu@correo.com" style={inp}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",color:"#446",fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:6}}>Contraseña</label>
          <input value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} type="password" placeholder="••••••••" style={inp}/>
        </div>
        {err&&<div style={{background:"rgba(254,44,85,.07)",border:"1px solid rgba(254,44,85,.2)",
          borderRadius:8,padding:"8px 12px",color:"#fe2c55",fontSize:12,marginBottom:12}}>{err}</div>}
        <button onClick={go} disabled={loading}
          style={{width:"100%",background:loading?"#151525":"linear-gradient(135deg,#fe2c55,#ff6b81)",
            border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",
            opacity:loading?0.6:1}}>
          {loading?"Verificando...":"Ingresar →"}
        </button>
        <p style={{color:"#2a2a3a",fontSize:10,textAlign:"center",marginTop:18}}>
          admin@tikpanel.com / admin123
        </p>
      </div>
    </div>
  );
}

/* ─── APP PRINCIPAL ─────────────────────────────── */
function App() {
  const [user,setUser]=useState(()=>ld("session",null));
  const [tab,setTab]=useState(()=>ld("tab","dashboard"));

  // Conexión
  const [tUser,setTUser]=useState(()=>ld("tuser",""));
  const [sessId,setSessId]=useState(()=>ld("sessid",""));
  const [conn,setConn]=useState(false);
  const [conn2,setConn2]=useState(false);
  const [dots,setDots]=useState("");
  const [connErr,setConnErr]=useState("");

  // Wake Lock
  const wakeLockRef=useRef(null);
  const [wakeLockOn,setWakeLockOn]=useState(false);
  const requestWakeLock=useCallback(async()=>{
    if(!('wakeLock'in navigator))return;
    try{
      if(wakeLockRef.current)return;
      wakeLockRef.current=await navigator.wakeLock.request('screen');
      setWakeLockOn(true);
      wakeLockRef.current.addEventListener('release',()=>{wakeLockRef.current=null;setWakeLockOn(false);});
    }catch(e){}
  },[]);
  const releaseWakeLock=useCallback(async()=>{
    if(wakeLockRef.current){await wakeLockRef.current.release();wakeLockRef.current=null;setWakeLockOn(false);}
  },[]);
  useEffect(()=>{
    const onVisible=()=>{if(document.visibilityState==='visible')requestWakeLock();};
    document.addEventListener('visibilitychange',onVisible);
    requestWakeLock();
    return()=>{document.removeEventListener('visibilitychange',onVisible);releaseWakeLock();};
  },[requestWakeLock,releaseWakeLock]);

  // Stats
  const [stats,setStats]=useState({viewers:0,gifts:0,follows:0,messages:0,likes:0});
  const [log,setLog]=useState([]);
  const [lAnim,setLAnim]=useState(false);
  const [fh,setFh]=useState([]);
  const [totDia,setTotDia]=useState(()=>ld("totDia",0));
  const [totLike,setTotLike]=useState(()=>ld("totLike",0));
  const [tapR,setTapR]=useState(()=>ld("tapR",[]));
  const [likeR,setLikeR]=useState(()=>ld("likeR",[]));
  const [viewR,setViewR]=useState(()=>ld("viewR",[]));
  const [topViewers,setTopViewers]=useState([]);

  // Batalla
  const [battle,setBattle]=useState(null);

  // TTS
  const [ttsMode,setTtsMode]=useState(()=>ld("ttsMode","native"));
  const [ttsOn,setTtsOn]=useState(()=>ld("ttsOn",true));
  const [ttsVol,setTtsVol]=useState(()=>ld("ttsVol",80));
  const [ttsVoice,setTtsVoice]=useState(()=>ld("ttsVoice","cgSgspJ2msm6clMCkdW9"));
  const [nativeVoices,setNativeVoices]=useState([]);
  const [nativeVoice,setNativeVoice]=useState(()=>ld("nativeVoice",""));
  const [elVoices,setElVoices]=useState(DEF_VOICES_EL);
  const [elOk,setElOk]=useState(null);
  const [ttsQueue,setTtsQueue]=useState(0); // contador visual de cola

  // Acciones
  const [actions,setActions]=useState(()=>ld("actions5",DEF_ACTIONS));
  const [alertsOn,setAlertsOn]=useState(()=>ld("alertsOn",true));
  const [showM,setShowM]=useState(false);
  const [editA,setEditA]=useState(null);
  const [searchQ,setSearchQ]=useState("");
  const [toast,setToast]=useState("");
  const [delConfirm,setDelConfirm]=useState(null);

  // Chat
  const [chatLog,setChatLog]=useState([]);

  // Refs
  const ttsOnR=useRef(ttsOn);
  const ttsVolR=useRef(ttsVol);
  const ttsModeR=useRef(ttsMode);
  const ttsVoiceR=useRef(ttsVoice);
  const nativeVoiceR=useRef(nativeVoice);
  const actsR=useRef(actions);
  const alertsOnR=useRef(alertsOn);

  const showT=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  // Sync refs
  useEffect(()=>{ttsOnR.current=ttsOn;sv("ttsOn",ttsOn);},[ttsOn]);
  useEffect(()=>{ttsVolR.current=ttsVol;sv("ttsVol",ttsVol);},[ttsVol]);
  useEffect(()=>{ttsModeR.current=ttsMode;sv("ttsMode",ttsMode);},[ttsMode]);
  useEffect(()=>{ttsVoiceR.current=ttsVoice;sv("ttsVoice",ttsVoice);},[ttsVoice]);
  useEffect(()=>{nativeVoiceR.current=nativeVoice;sv("nativeVoice",nativeVoice);},[nativeVoice]);
  useEffect(()=>{actsR.current=actions;sv("actions5",actions);},[actions]);
  useEffect(()=>{alertsOnR.current=alertsOn;sv("alertsOn",alertsOn);},[alertsOn]);
  useEffect(()=>{sv("tab",tab);},[tab]);
  useEffect(()=>{sv("tuser",tUser);},[tUser]);
  useEffect(()=>{sv("sessid",sessId);},[sessId]);
  useEffect(()=>{sv("totDia",totDia);},[totDia]);
  useEffect(()=>{sv("totLike",totLike);},[totLike]);
  useEffect(()=>{sv("tapR",tapR);},[tapR]);
  useEffect(()=>{sv("likeR",likeR);},[likeR]);
  useEffect(()=>{sv("viewR",viewR);},[viewR]);

  // Voces nativas del navegador
  useEffect(()=>{
    const load=()=>{
      const vs=window.speechSynthesis?.getVoices()||[];
      const esList=vs.filter(v=>v.lang.startsWith("es")||v.lang.startsWith("en"));
      setNativeVoices(esList.length?esList:vs);
      if(!nativeVoice&&esList.length){
        const def=esList.find(v=>v.lang.startsWith("es-MX"))||esList[0];
        if(def){setNativeVoice(def.name);nativeVoiceR.current=def.name;}
      }
    };
    load();
    window.speechSynthesis?.addEventListener("voiceschanged",load);
    return()=>window.speechSynthesis?.removeEventListener("voiceschanged",load);
  },[]);

  // Voces ElevenLabs
  useEffect(()=>{
    if(ttsMode!=="elevenlabs")return;
    fetch("https://api.elevenlabs.io/v1/voices",{headers:{"xi-api-key":EL_KEY}})
      .then(r=>r.json())
      .then(d=>{
        if(d.voices?.length){
          const m=d.voices.map(v=>({id:v.voice_id,name:v.name}));
          setElVoices([...DEF_VOICES_EL,...m.filter(v=>!DEF_VOICES_EL.find(x=>x.id===v.id))]);
          setElOk(true);
        }
      }).catch(()=>setElOk(false));
  },[ttsMode]);

  // Dots animación
  useEffect(()=>{
    if(!conn2)return;
    const t=setInterval(()=>setDots(d=>d.length>=3?"":d+"."),400);
    return()=>clearInterval(t);
  },[conn2]);

  // Actualizar contador de cola TTS (visual)
  useEffect(()=>{
    const t=setInterval(()=>setTtsQueue(ttsQ.length),800);
    return()=>clearInterval(t);
  },[]);

  /* ─── Disparar acción ──────────────────────── */
  const fireAction=useCallback((eventType, giftName="", nickname="", giftCount=1)=>{
    if(!alertsOnR.current)return;
    const acts=actsR.current.filter(a=>a.enabled&&a.event===eventType);
    for(const act of acts){
      if(act.event==="Gift Alert"){
        const gn=(giftName||"").toLowerCase();
        const an=(act.giftName||"").toLowerCase();
        // "cualquier regalo" coincide con todo
        if(an!=="cualquier regalo"){
          // Buscar por id o nombre
          const giftDb=TIKTOK_GIFTS_DB.find(g=>g.id===an||g.name.toLowerCase()===an);
          const matchName=giftDb?gn.includes(giftDb.name.toLowerCase())||gn===giftDb.id:gn.includes(an);
          if(!matchName)continue;
        }
        if(giftCount<act.minCount)continue;
      }
      if(act.soundData) playAudio(act.soundData, ttsVolR.current/100);
      if(act.ttsOn&&act.ttsText&&ttsOnR.current){
        const text=act.ttsText.replace(/@usuario/gi,nickname);
        if(ttsModeR.current==="elevenlabs"){
          enqueueTTS(text,ttsVoiceR.current,ttsVolR.current/100,"elevenlabs");
        }else{
          enqueueTTS(text,nativeVoiceR.current,ttsVolR.current/100,"native");
        }
      }
    }
  },[]);

  /* ─── Socket.IO ─────────────────────────────── */
  useEffect(()=>{
    const sock=io(SERVER,{transports:["websocket"],reconnection:true,reconnectionAttempts:Infinity,
      reconnectionDelay:1500,reconnectionDelayMax:8000,timeout:12000});
    sock.on("connect",()=>console.log("Socket conectado:",sock.id));
    sock.on("connect_error",e=>console.warn("Socket error:",e.message));

    sock.on("event",d=>{
      if(d.type==="chat"){
        const msg=`@${d.nickname||d.user}: ${d.comment}`;
        setLog(p=>[{t:"msg",tx:`💬 ${msg}`},...p].slice(0,50));
        setChatLog(p=>[{user:d.nickname||d.user,text:d.comment,ts:Date.now()},...p].slice(0,100));
        setStats(p=>({...p,messages:p.messages+1}));
        // TTS Chat — solo si está activo
        if(ttsOnR.current){
          const text=`${d.nickname||d.user} dice: ${d.comment}`;
          if(ttsModeR.current==="elevenlabs"){
            enqueueTTS(text,ttsVoiceR.current,ttsVolR.current/100,"elevenlabs");
          }else{
            enqueueTTS(text,nativeVoiceR.current,ttsVolR.current/100,"native");
          }
        }
      }else if(d.type==="gift"){
        setLog(p=>[{t:"gift",tx:`🎁 @${d.nickname||d.user} → ${d.giftCount}× ${d.giftName}`},...p].slice(0,50));
        setStats(p=>({...p,gifts:p.gifts+1}));
        const dm=d.diamondCount||0;
        setTotDia(p=>p+dm);
        setTapR(prev=>{
          const ex=prev.find(u=>u.user===d.user);
          const upd=ex?prev.map(u=>u.user===d.user?{...u,diamonds:u.diamonds+dm,gifts:u.gifts+1}:u)
            :[...prev,{user:d.user,nickname:d.nickname||d.user,diamonds:dm,gifts:1}];
          return upd.sort((a,b)=>b.diamonds-a.diamonds).slice(0,10);
        });
        fireAction("Gift Alert",d.giftName,d.nickname||d.user,d.giftCount);
      }else if(d.type==="follow"){
        setLog(p=>[{t:"follow",tx:`➕ @${d.nickname||d.user} te siguió`},...p].slice(0,50));
        setStats(p=>({...p,follows:p.follows+1}));
        fireAction("Follow Alert","",d.nickname||d.user);
      }else if(d.type==="like"){
        const lc=d.likeCount||1;
        setLog(p=>[{t:"like",tx:`❤️ ×${lc} likes de @${d.nickname||d.user}`},...p].slice(0,50));
        setStats(p=>({...p,likes:p.likes+lc}));
        setTotLike(p=>p+lc);
        setLAnim(true);setTimeout(()=>setLAnim(false),300);
        const hid=Date.now();
        setFh(p=>[...p,{id:hid,x:Math.random()*60+20}]);
        setTimeout(()=>setFh(p=>p.filter(h=>h.id!==hid)),1200);
        setLikeR(prev=>{
          const ex=prev.find(u=>u.user===d.user);
          const nn=d.nickname||d.user;
          const upd=ex?prev.map(u=>u.user===d.user?{...u,count:u.count+lc,nickname:nn}:u)
            :[...prev,{user:d.user,nickname:nn,count:lc}];
          return upd.sort((a,b)=>b.count-a.count).slice(0,10);
        });
        fireAction("Like Alert","",d.nickname||d.user);
      }else if(d.type==="sub"){
        setLog(p=>[{t:"sub",tx:`⭐ @${d.nickname||d.user} se suscribió`},...p].slice(0,50));
        fireAction("Sub Alert","",d.nickname||d.user);
      }else if(d.type==="share"){
        setLog(p=>[{t:"share",tx:`📤 @${d.nickname||d.user} compartió`},...p].slice(0,50));
        fireAction("Share Alert","",d.nickname||d.user);
      }
    });

    sock.on("viewers",d=>{
      setStats(p=>({...p,viewers:d.count||0}));
      if(Array.isArray(d.topViewers)&&d.topViewers.length>0){
        setTopViewers(d.topViewers.filter(v=>v.user&&v.user!=="?"));
      }
    });

    sock.on("member",d=>{
      if(!d.user)return;
      setViewR(prev=>{
        const ex=prev.find(u=>u.user===d.user);
        if(ex)return prev.map(u=>u.user===d.user?{...u,joinTime:d.timestamp||Date.now()}:u);
        return [{user:d.user,nickname:d.nickname||d.user,joinTime:d.timestamp||Date.now()},...prev].slice(0,300);
      });
    });

    /* ─── BATALLA — Puntos INDIVIDUALES ───────────
       En un 2v2 de TikTok, cada "team" tiene 2 hosts.
       El servidor manda teams[].points que es el score GRUPAL.
       Aquí hacemos que si hay datos de miembros individuales los mostramos.
       Si no hay datos individuales, igualmente mostramos por host (1 per team).
    */
    sock.on("battle",d=>{
      if(d&&d.teams){
        const normalized={
          ...d,
          ownerUsername:(d.ownerUsername||tUser||"").toLowerCase().replace(/^@/,""),
          teams:d.teams.map(t=>({
            hostName:t.hostName||t.uniqueId||t.displayId||"?",
            hostNickname:t.hostNickname||t.nickname||t.hostName||"?",
            // Puntos individuales: usar battleScore del host si existe, si no usar points del equipo
            points:Number(t.battleScore||t.hostPoints||t.hostScore||t.points||t.score||0),
            // Miembros del equipo para 2v2
            members:Array.isArray(t.members)?t.members.map(m=>({
              nickname:m.nickname||m.uniqueId||m.hostName||"?",
              points:Number(m.battleScore||m.points||m.score||0),
            })):[],
          })).filter(t=>t.hostName!=="?"),
        };
        setBattle(normalized);
      }else{
        setBattle(d);
      }
    });

    sock.on("tiktok_disconnected",d=>{
      setConn(false);
      setLog(p=>[{t:"sys",tx:`⚠️ TikTok desconectado (@${d?.username||"?"}). Reconecta.`},...p].slice(0,50));
    });
    sock.on("tiktok_error",d=>{
      setLog(p=>[{t:"sys",tx:`⚠️ Error: ${d.message}`},...p].slice(0,50));
    });

    return()=>sock.disconnect();
  },[fireAction]);

  // Restaurar sesión
  useEffect(()=>{

        setTopViewers([]);setTotDia(0);setTotLike(0);setTapR([]);setLikeR([]);
        setBattle(null);setViewR([]);sv("viewR",[]);
        setLog([{t:"sys",tx:`✅ Conectado a @${tUser}`}]);
        setChatLog([]);
        clearTTSQueue();
      }else{
        setConn2(false);setConnErr(d.error||"¿Estás en LIVE?");
        setLog(p=>[{t:"sys",tx:`⚠️ ${d.error||"¿Estás en LIVE?"}`},...p]);
      }
    }catch(e){
      setConn2(false);setConnErr("Sin respuesta del servidor");
      setLog(p=>[{t:"sys",tx:"⚠️ Sin respuesta del servidor"},...p]);
    }
  };

    setStats({viewers:0,gifts:0,follows:0,messages:0,likes:0});

                          </span>
                          {giftDb&&<span style={{fontSize:9,color:"#fbbf24",fontWeight:700,
                            background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.2)",
                            borderRadius:20,padding:"1px 7px"}}>
                            {giftDb.emoji} {giftDb.name} · 🪙{giftDb.coins.toLocaleString()}
                          </span>}
                          {act.soundName&&<span style={{fontSize:9,color:"#25f4ee",
                            background:"rgba(37,244,238,.07)",border:"1px solid rgba(37,244,238,.15)",
                            borderRadius:20,padding:"1px 7px"}}>🎵 {act.soundName}</span>}
                          {act.ttsOn&&<span style={{fontSize:9,color:"#a78bfa",
                            background:"rgba(167,139,250,.07)",border:"1px solid rgba(167,139,250,.15)",
                            borderRadius:20,padding:"1px 7px"}}>🔊 TTS</span>}
                        </div>
                      </div>
                      {/* Controles */}
                      <Toggle on={act.enabled} onChange={()=>setActions(p=>p.map(a=>a.id===act.id?{...a,enabled:!a.enabled}:a))} size="sm"/>
                      <button onClick={()=>testAction(act)}
                        style={{background:"rgba(37,244,238,.07)",border:"1px solid rgba(37,244,238,.2)",
                          borderRadius:7,padding:"5px 9px",color:"#25f4ee",fontSize:10,fontWeight:700,cursor:"pointer"}}>▶</button>
                      <button onClick={()=>{setEditA(act);setShowM(true);}}
                        style={{background:"rgba(255,255,255,.04)",border:"1px solid #1e1e35",
                          borderRadius:7,padding:"5px 9px",color:"#aaa",fontSize:10,cursor:"pointer"}}>✏️</button>
                      <button onClick={()=>setDelConfirm(act.id)}
                        style={{background:"rgba(254,44,85,.06)",border:"1px solid rgba(254,44,85,.15)",
                          borderRadius:7,padding:"5px 9px",color:"#fe2c55",fontSize:10,cursor:"pointer"}}>🗑️</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ═══ TTS / VOZ & AUDIO ══════════════════ */}
          {tab==="tts"&&(
            <div className="ai">
              {/* Modo */}
              <div style={C}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,marginBottom:12,color:"#fff"}}>🔊 Motor de voz</div>
                <div style={{display:"flex",gap:6,marginBottom:14}}>
                  {[{id:"native",l:"🌐 Voz del navegador (gratis)"},{id:"elevenlabs",l:"⚡ ElevenLabs (IA)"}].map(m=>(
                    <button key={m.id} onClick={()=>setTtsMode(m.id)}
                      style={{flex:1,padding:"9px 6px",borderRadius:9,
                        border:`1px solid ${ttsMode===m.id?"rgba(254,44,85,.4)":"#1e1e35"}`,
                        background:ttsMode===m.id?"rgba(254,44,85,.08)":"transparent",
                        color:ttsMode===m.id?"#fe2c55":"#555",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                      {m.l}
                    </button>
                  ))}
                </div>

                {/* TTS Global ON/OFF */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,
                  padding:"10px 12px",background:ttsOn?"rgba(37,244,238,.04)":"rgba(255,255,255,.02)",
                  border:`1px solid ${ttsOn?"rgba(37,244,238,.2)":"#1e1e35"}`,borderRadius:10}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:ttsOn?"#25f4ee":"#666"}}>
                      {ttsOn?"TTS activado — leyendo chat":"TTS desactivado"}
                    </div>
                    <div style={{fontSize:10,color:"#444",marginTop:2}}>Lee mensajes del chat en voz alta</div>
                  </div>
                  <Toggle on={ttsOn} onChange={()=>{setTtsOn(!ttsOn);if(ttsOn)clearTTSQueue();}} color="#25f4ee"/>
                </div>

                {/* Cola visual */}
                {ttsQueue>0&&(
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"7px 12px",background:"rgba(37,244,238,.04)",border:"1px solid rgba(37,244,238,.15)",
                    borderRadius:8,marginBottom:10}}>
                    <span className="tts-badge">🔊 {ttsQueue} mensajes en cola</span>
                    <button onClick={clearTTSQueue}
                      style={{background:"rgba(254,44,85,.08)",border:"1px solid rgba(254,44,85,.2)",
                        borderRadius:6,padding:"4px 10px",color:"#fe2c55",fontSize:10,fontWeight:700,cursor:"pointer"}}>
                      Limpiar cola
                    </button>
                  </div>
                )}

                {/* Volumen */}
                <div style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:11,color:"#888"}}>Volumen</span>
                    <span style={{fontSize:11,color:"#fff",fontWeight:700}}>{ttsVol}%</span>
                  </div>
                  <input type="range" min={0} max={100} value={ttsVol}
                    onChange={e=>setTtsVol(Number(e.target.value))}
                    style={{width:"100%",accentColor:"#fe2c55",cursor:"pointer"}}/>
                </div>

                {/* Selector de voz */}
                {ttsMode==="native"&&nativeVoices.length>0&&(
                  <div style={{marginBottom:12}}>
                    <label style={lbl}>Voz del navegador</label>
                    <select style={{...inp,cursor:"pointer"}} value={nativeVoice}
                      onChange={e=>setNativeVoice(e.target.value)}>
                      {nativeVoices.map(v=><option key={v.name} value={v.name}>{v.name} ({v.lang})</option>)}
                    </select>
                  </div>
                )}
                {ttsMode==="elevenlabs"&&(
                  <div style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                      <label style={lbl}>Voz ElevenLabs</label>
                      {elOk===true&&<span style={{fontSize:9,color:"#4ade80"}}>✓ Conectado</span>}
                      {elOk===false&&<span style={{fontSize:9,color:"#fe2c55"}}>✗ Error de clave API</span>}
                    </div>
                    <select style={{...inp,cursor:"pointer"}} value={ttsVoice}
                      onChange={e=>setTtsVoice(e.target.value)}>
                      {elVoices.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
                    </select>
                  </div>
                )}

                {/* Probar */}
                <button onClick={()=>{
                  const text="Hola, este es el TTS de tu LIVE de TikTok. ¡Todo está funcionando!";
                  enqueueTTS(text,ttsMode==="elevenlabs"?ttsVoice:nativeVoice,ttsVol/100,ttsMode);
                }}
                  style={{background:"rgba(254,44,85,.08)",border:"1px solid rgba(254,44,85,.2)",
                    borderRadius:9,padding:"9px",color:"#fe2c55",fontSize:12,fontWeight:700,
                    cursor:"pointer",width:"100%"}}>
                  🔊 Probar voz ahora
                </button>
              </div>

              {/* Info sobre el bug del TTS nativo en Chrome */}
              {ttsMode==="native"&&(
                <div style={{...C,borderColor:"rgba(251,191,36,.15)"}}>
                  <div style={{fontSize:10,color:"#fbbf24",fontWeight:700,marginBottom:5}}>💡 Tip: TTS en Chrome/Android</div>
                  <div style={{fontSize:11,color:"#555",lineHeight:1.6}}>
                    El TTS nativo puede pausarse si cambias de app. Este panel activa un Wake Lock y un resume automático para que nunca se calle. Si hay silencio, toca "Limpiar cola" y vuelve a activar.
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ═══ RANKING ════════════════════════════ */}
          {tab==="ranking"&&(
            <div className="ai">
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <div style={{...C,flex:1,margin:0,textAlign:"center",padding:10}}>
                  <div style={{fontSize:9,color:"#fbbf24",fontWeight:700,letterSpacing:1,marginBottom:4}}>💎 DIAMANTES</div>
                  <div style={{fontSize:20,fontWeight:900,color:"#fbbf24",fontFamily:"'Syne',sans-serif"}}>{totDia.toLocaleString()}</div>
                </div>
                <div style={{...C,flex:1,margin:0,textAlign:"center",padding:10}}>
                  <div style={{fontSize:9,color:"#fb7185",fontWeight:700,letterSpacing:1,marginBottom:4}}>❤️ LIKES</div>
                  <div style={{fontSize:20,fontWeight:900,color:"#fb7185",fontFamily:"'Syne',sans-serif"}}>{totLike.toLocaleString()}</div>
                </div>
              </div>

              <div style={C}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,marginBottom:12}}>🏆 Top Diamantes</div>
                {tapR.length===0
                  ?<div style={{color:"#333",fontSize:12,textAlign:"center",padding:"20px 0"}}>Sin datos aún</div>
                  :tapR.map((u,i)=>(
                    <div key={u.user} className={i===0?"rank1":i===1?"rank2":i===2?"rank3":""}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",
                        borderRadius:9,border:"1px solid transparent",marginBottom:5}}>
                      <span style={{fontSize:i<3?18:13,minWidth:20,textAlign:"center"}}>
                        {i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`}
                      </span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.nickname}</div>
                        <div style={{fontSize:10,color:"#555"}}>{u.gifts} regalos</div>
                      </div>
                      <span style={{fontSize:13,fontWeight:700,color:"#fbbf24"}}>💎 {u.diamonds}</span>
                    </div>
                  ))
                }
              </div>

              <div style={C}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,marginBottom:12}}>❤️ Top Likes</div>
                {likeR.length===0
                  ?<div style={{color:"#333",fontSize:12,textAlign:"center",padding:"20px 0"}}>Sin datos aún</div>
                  :likeR.map((u,i)=>(
                    <div key={u.user} className={i===0?"rank1":i===1?"rank2":i===2?"rank3":""}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",
                        borderRadius:9,border:"1px solid transparent",marginBottom:5}}>
                      <span style={{fontSize:i<3?18:13,minWidth:20,textAlign:"center"}}>
                        {i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`}
                      </span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.nickname}</div>
                      </div>
                      <span style={{fontSize:13,fontWeight:700,color:"#fb7185"}}>❤️ {u.count}</span>
                    </div>
                  ))
                }
              </div>
            </div>
          )}

          {/* ═══ CHAT ════════════════════════════ */}
          {tab==="chat"&&(
            <div className="ai">
              <div style={C}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13}}>💬 Chat en vivo</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,color:"#444"}}>{chatLog.length} mensajes</span>
                    <button onClick={()=>setChatLog([])}
                      style={{background:"rgba(255,255,255,.04)",border:"1px solid #1e1e35",borderRadius:7,
                        padding:"4px 9px",color:"#555",fontSize:10,cursor:"pointer"}}>Limpiar</button>
                  </div>
                </div>
                <div style={{background:"#080810",borderRadius:10,padding:10,height:420,overflowY:"auto",display:"flex",flexDirection:"column",gap:5}}>
                  {chatLog.length===0
                    ?<div style={{color:"#2a2a3a",fontSize:12,textAlign:"center",marginTop:80}}>
                      {conn?"Esperando mensajes...":"Conecta tu LIVE para ver el chat"}
                    </div>
                    :chatLog.map((m,i)=>(
                      <div key={i} className="log-item" style={{background:"rgba(255,255,255,.025)",borderLeftColor:"#252545"}}>
                        <span style={{color:"#fe2c55",fontWeight:700,marginRight:5}}>@{m.user}</span>
                        <span style={{color:"#ccc"}}>{m.text}</span>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          )}

          {/* ═══ BATALLA ════════════════════════════
              CAMBIO CLAVE: mostrar puntos INDIVIDUALES por host, no agrupados */}
          {tab==="batalla"&&(
            <div className="ai">
              {!battle
                ?<div style={{...C,textAlign:"center",padding:"40px 20px"}}>
                  <div style={{fontSize:40,marginBottom:12}}>⚔️</div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,marginBottom:6}}>Sin batalla activa</div>
                  <div style={{color:"#444",fontSize:12}}>Cuando hagas una batalla en TikTok LIVE, los datos aparecerán aquí con puntos individuales.</div>
                </div>
                :(()=>{
                  const teams=(battle.teams||[]);
                  const maxPts=Math.max(1,...teams.map(t=>t.points));

                  // Detectar si hay miembros individuales (2v2)
                  const hasIndividual=teams.some(t=>t.members&&t.members.length>1);

                  return (
                    <div>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:15,marginBottom:14,
                        textAlign:"center",color:"#fff",letterSpacing:-.3}}>
                        ⚔️ Batalla en vivo
                      </div>

                      {/* Si hay datos individuales (2v2), mostrar por persona */}
                      {hasIndividual?(
                        <div>
                          <div style={{fontSize:9,color:"#555",fontWeight:700,letterSpacing:1,textAlign:"center",marginBottom:10}}>PUNTOS INDIVIDUALES</div>
                          {teams.map((team,ti)=>(
                            <div key={ti} style={{marginBottom:14}}>
                              <div style={{fontSize:10,color:"#fe2c55",fontWeight:700,letterSpacing:1,marginBottom:8,
                                padding:"4px 10px",background:"rgba(254,44,85,.06)",borderRadius:6,display:"inline-block"}}>
                                EQUIPO {ti+1}
                              </div>
                              {team.members.map((m,mi)=>{
                                const maxM=Math.max(1,...teams.flatMap(t=>t.members?.map(mm=>mm.points)||[t.points]));
                                const pct=Math.max(3,(m.points/maxM)*100);
                                return (
                                  <div key={mi} style={{marginBottom:10}}>
                                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                                      <span style={{fontSize:12,fontWeight:700,color:"#fff"}}>{m.nickname}</span>
                                      <span className="battle-score" style={{fontSize:18,color:ti===0?"#fe2c55":"#25f4ee"}}>
                                        {m.points.toLocaleString()}
                                      </span>
                                    </div>
                                    <div style={{background:"#0a0a18",borderRadius:4,height:8,overflow:"hidden"}}>
                                      <div className="battle-bar" style={{width:`${pct}%`,
                                        background:`linear-gradient(90deg,${ti===0?"#fe2c55,#ff8f9f":"#25f4ee,#7ff9f5"})`}}/>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          ))}
                        </div>
                      ):(
                        /* Sin miembros individuales: mostrar por host (1v1 o datos simples) */
                        <div>
                          <div style={{fontSize:9,color:"#555",fontWeight:700,letterSpacing:1,textAlign:"center",marginBottom:10}}>PUNTOS POR STREAMER</div>
                          {teams.map((team,ti)=>{
                            const pct=Math.max(3,(team.points/maxPts)*100);
                            const isOwner=team.hostName.toLowerCase()===battle.ownerUsername;
                            return (
                              <div key={ti} style={{...C,marginBottom:10,
                                borderColor:isOwner?"rgba(254,44,85,.3)":"rgba(37,244,238,.2)"}}>
                                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                                  <div>
                                    <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>
                                      {isOwner?"⭐ ":""}{team.hostNickname}
                                    </div>
                                    <div style={{fontSize:10,color:"#444"}}>@{team.hostName}</div>
                                  </div>
                                  <div className="battle-score" style={{color:isOwner?"#fe2c55":"#25f4ee"}}>
                                    {team.points.toLocaleString()}
                                  </div>
                                </div>
                                <div style={{background:"#0a0a18",borderRadius:6,height:10,overflow:"hidden"}}>
                                  <div className="battle-bar" style={{width:`${pct}%`,
                                    background:`linear-gradient(90deg,${isOwner?"#fe2c55,#ff8f9f":"#25f4ee,#7ff9f5"})`}}/>
                                </div>
                              </div>
                            );
                          })}

                          {/* Resumen comparativo */}
                          {teams.length>=2&&(
                            <div style={{...C,padding:12,textAlign:"center"}}>
                              <div style={{fontSize:9,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:8}}>DIFERENCIA DE PUNTOS</div>
                              <div style={{fontSize:24,fontWeight:900,fontFamily:"'Syne',sans-serif",
                                color:Math.abs(teams[0].points-teams[1].points)>0?"#fbbf24":"#555"}}>
                                {Math.abs(teams[0].points-(teams[1]?.points||0)).toLocaleString()}
                              </div>
                              <div style={{fontSize:10,color:"#444",marginTop:4}}>
                                {teams[0].points>=(teams[1]?.points||0)
                                  ?`${teams[0].hostNickname} va ganando`
                                  :`${teams[1].hostNickname} va ganando`}
                              </div>
                            </div>
                          )}
                        </div>
                      )}

                      {/* Debug info colapsable */}
                      <div style={{...C,borderColor:"#111120"}}>
                        <div style={{fontSize:9,color:"#252545",fontWeight:700}}>
                          Equipos detectados: {teams.length} · 
                          {hasIndividual?` Modo 2v2 (${teams.reduce((acc,t)=>acc+(t.members?.length||0),0)} jugadores)`:` Modo individual por host`}
                        </div>
                      </div>
                    </div>
                  );
                })()
              }
            </div>
          )}

          {/* ═══ ESPECTADORES ═══════════════════════ */}
          {tab==="espect"&&(
            <div className="ai">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                <div style={{...C,margin:0,textAlign:"center",padding:12}}>
                  <div style={{fontSize:9,color:"#25f4ee",fontWeight:700,letterSpacing:1,marginBottom:4}}>👁️ AHORA</div>
                  <div style={{fontSize:24,fontWeight:900,color:"#25f4ee",fontFamily:"'Syne',sans-serif"}}>{stats.viewers.toLocaleString()}</div>
                </div>
                <div style={{...C,margin:0,textAlign:"center",padding:12}}>
                  <div style={{fontSize:9,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:4}}>📜 HISTORIAL</div>
                  <div style={{fontSize:24,fontWeight:900,color:"#a78bfa",fontFamily:"'Syne',sans-serif"}}>{viewR.length.toLocaleString()}</div>
                </div>
              </div>

              {topViewers.length>0&&(
                <div style={C}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,marginBottom:10}}>👁️ Activos ahora</div>
                  {topViewers.slice(0,10).map((v,i)=>(
                    <div key={v.user} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",
                      borderRadius:8,marginBottom:4,background:"rgba(37,244,238,.03)",border:"1px solid #1a1a2e"}}>
                      <span style={{fontSize:11,color:"#333",minWidth:18,textAlign:"center"}}>{i+1}</span>
                      <span style={{flex:1,fontSize:12,fontWeight:600,color:"#ddd",
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.nickname||v.user}</span>
                    </div>
                  ))}
                </div>
              )}

              <div style={C}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13}}>📜 Historial de entradas</div>
                  <button onClick={()=>{setViewR([]);sv("viewR",[]);}}
                    style={{background:"rgba(254,44,85,.06)",border:"1px solid rgba(254,44,85,.15)",
                      borderRadius:7,padding:"4px 9px",color:"#fe2c55",fontSize:10,cursor:"pointer"}}>Limpiar</button>
                </div>
                <div style={{maxHeight:320,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                  {viewR.length===0
                    ?<div style={{color:"#2a2a3a",fontSize:12,textAlign:"center",padding:"20px 0"}}>Sin historial aún</div>
                    :viewR.map((v,i)=>(
                      <div key={v.user+i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",
                        borderRadius:7,background:"rgba(255,255,255,.02)"}}>
                        <span style={{flex:1,fontSize:11,color:"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {v.nickname||v.user}
                        </span>
                        <span style={{fontSize:9,color:"#333"}}>
                          {new Date(v.joinTime).toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})}
                        </span>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
