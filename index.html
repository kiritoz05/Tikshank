<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0a0a0f}
body{color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
input,select,button,textarea{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0a0f}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(220%)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.ai{animation:fadeIn .25s ease forwards}
.ld{animation:pulse 1.2s infinite}
.cf{animation:slide 1.5s ease-in-out infinite}
.fh{position:absolute;animation:fu 1s ease forwards;pointer-events:none;font-size:18px;z-index:10}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
@media(min-width:580px){.mo{align-items:center;padding:16px}}
.mb{background:#12121e;border:1px solid #252535;border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:530px;max-height:94vh;overflow-y:auto;animation:slideUp .25s ease}
@media(min-width:580px){.mb{border-radius:20px;animation:popIn .2s ease}}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap}
.bf{background:rgba(37,244,238,.1);color:#25f4ee;border:1px solid rgba(37,244,238,.2)}
.bg{background:rgba(254,44,85,.1);color:#fe2c55;border:1px solid rgba(254,44,85,.2)}
.bl{background:rgba(245,197,24,.1);color:#f5c518;border:1px solid rgba(245,197,24,.2)}
.bs{background:rgba(139,92,246,.1);color:#8b5cf6;border:1px solid rgba(139,92,246,.2)}
.bsh{background:rgba(255,255,255,.05);color:#777;border:1px solid rgba(255,255,255,.1)}
.it{width:28px;height:16px;border-radius:8px;cursor:pointer;position:relative;border:none;flex-shrink:0;background:#1e1e2e;transition:background .2s;outline:none}
.it.on{background:#fe2c55}
.it::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.5)}
.it.on::after{left:14px}
.ua{background:#0a0a0f;border:1.5px dashed #252535;border-radius:10px;padding:11px;display:flex;align-items:center;gap:9px;position:relative;overflow:hidden;transition:border-color .2s;cursor:pointer}
.ua:hover,.ua.has{border-color:#25f4ee}
.ua.has{border-style:solid}
.ua input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f2010;border:1px solid #2a5a2a;border-radius:10px;padding:9px 18px;color:#4ade80;font-size:12px;font-weight:700;z-index:999;white-space:nowrap;animation:popIn .2s ease}
.spinner{width:14px;height:14px;border:2px solid #333;border-top-color:#fe2c55;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
#root{min-height:100vh;background:#0a0a0f}

#loading{position:fixed;inset:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999}
#loading .logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#fe2c55,#25f4ee);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;font-family:'Syne',sans-serif}
#loading p{color:#555;font-size:13px}
</style>

<script>
"use strict";
// ─── Constantes ────────────────────────────────
const { createElement: h, useState, useEffect, useRef, useCallback } = React;
const SERVER = "https://tikshank-production.up.railway.app";

// ─── Storage helpers ────────────────────────────
const sv = (k,v) => { try { localStorage.setItem("tp_"+k, JSON.stringify(v)); } catch(e){} };
const ld = (k,d)  => { try { const v=localStorage.getItem("tp_"+k); return v!==null ? JSON.parse(v) : d; } catch(e){ return d; } };

// ─── TTS ────────────────────────────────────────
const ttsQ = []; let ttsActive = false;
function enqueueTTS(text, vol) {
  if (!text?.trim()) return;
  ttsQ.push({text:text.trim(), vol});
  if (!ttsActive) drainTTS();
}
function drainTTS() {
  if (!ttsQ.length) { ttsActive=false; return; }
  ttsActive = true;
  const {text, vol} = ttsQ.shift();
  if (!window.speechSynthesis) { setTimeout(drainTTS,50); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.volume = Math.min(1, Math.max(0, vol));
  u.rate = 1.05; u.lang = "es-MX";
  const vs = window.speechSynthesis.getVoices();
  const esVoice = vs.find(v=>v.lang.startsWith("es"));
  if (esVoice) u.voice = esVoice;
  u.onend = u.onerror = () => setTimeout(drainTTS,50);
  window.speechSynthesis.speak(u);
  setTimeout(() => setTimeout(drainTTS,50), 15000);
}
function playAudio(src, vol) {
  return new Promise(res => {
    const a = new Audio(src);
    a.volume = Math.min(1, Math.max(0, vol));
    a.onended = a.onerror = res;
    a.play().catch(res);
    setTimeout(res, 30000);
  });
}
function fileToBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ─── Datos TikTok ────────────────────────────────
const EV_TYPES = ["Follow Alert","Gift Alert","Like Alert","Sub Alert","Share Alert"];
const TIKTOK_GIFTS = ["Cualquier regalo","Rose","You're awesome","GG","TikTok","Ice Cream Cone","Pop","Love you so much","GG EZ","Tulip","Heart","Lion","Diamond","Crown","Universe","UFO","Dragon","Phoenix","Bear","Castle","Concert","Rocket","Galaxy","Airplane","Planet","Sunflower","Birthday Cake","Panda","Corgi","Owl","Mermaid","Elephant","Ferris Wheel"];
const DEF_ACTIONS = [
  {id:1,enabled:true,name:"Follow Alert",event:"Follow Alert",giftName:"",minCount:1,duration:5,soundName:"",soundData:"",ttsOn:false,ttsText:"¡Gracias @usuario por seguirme!"},
  {id:2,enabled:true,name:"Rosa Gift",event:"Gift Alert",giftName:"Rose",minCount:1,duration:5,soundName:"",soundData:"",ttsOn:false,ttsText:"¡Gracias @usuario por la rosa!"},
  {id:3,enabled:true,name:"Like Alert",event:"Like Alert",giftName:"",minCount:1,duration:5,soundName:"",soundData:"",ttsOn:false,ttsText:""},
  {id:4,enabled:false,name:"Sub Alert",event:"Sub Alert",giftName:"",minCount:1,duration:10,soundName:"",soundData:"",ttsOn:false,ttsText:"¡Gracias @usuario por suscribirte!"},
  {id:5,enabled:false,name:"León Gift",event:"Gift Alert",giftName:"Lion",minCount:1,duration:8,soundName:"",soundData:"",ttsOn:false,ttsText:"¡WOW! @usuario mandó un LEÓN! 🦁"},
];
const USERS = {
  "admin@tikpanel.com":   {password:"admin123",name:"Admin",plan:"Pro",avatar:"A"},
  "luzalva@tikpanel.com": {password:"luz2024",name:"Luz Álva",plan:"Pro",avatar:"L"},
  "usuario@tikpanel.com": {password:"pass123",name:"Streamer",plan:"Free",avatar:"S"},
};

// ─── Estilos compartidos ─────────────────────────
const INP = {width:"100%",background:"#0a0a0f",border:"1px solid #252535",borderRadius:8,padding:"9px 12px",color:"#fff",fontSize:12,outline:"none"};
const LBL = {display:"block",color:"#556",fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:5};
const CARD = {background:"#12121e",border:"1px solid #1e1e2e",borderRadius:14,padding:15,marginBottom:12};

// ─── Toggle component ────────────────────────────
function Toggle({on, onChange, color="#fe2c55", size="md"}) {
  const w=size==="sm"?28:42, h2=size==="sm"?16:23, dot=size==="sm"?12:19;
  return h("div",{
    onClick:onChange,
    style:{width:w,height:h2,borderRadius:w,cursor:"pointer",position:"relative",
      background:on?color:"#1e1e2e",transition:"background .2s",flexShrink:0,
      border:"1px solid rgba(255,255,255,.05)"}
  }, h("div",{
    style:{position:"absolute",top:2,left:on?w-dot-2:2,width:dot,height:dot,
      borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.5)"}
  }));
}

// ─── Login ───────────────────────────────────────
function Login({onLogin}) {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  
  const go = () => {
    setErr(""); setLoading(true);
    setTimeout(() => {
      const u = USERS[email.toLowerCase()];
      if (u && u.password === pass) onLogin({...u, email});
      else { setErr("Correo o contraseña incorrectos."); setLoading(false); }
    }, 600);
  };

  return h("div", {style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a0f",padding:20}},
    h("div", {style:{background:"#12121e",border:"1px solid #1e1e2e",borderRadius:22,padding:"40px 32px",width:"100%",maxWidth:380,boxShadow:"0 40px 80px rgba(0,0,0,.7)"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:9,marginBottom:6}},
        h("div",{style:{width:36,height:36,borderRadius:9,background:"linear-gradient(135deg,#fe2c55,#25f4ee)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:17}},"T"),
        h("span",{style:{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:21,letterSpacing:-.5}},
          "ik", h("span",{style:{color:"#fe2c55"}},"Panel"))
      ),
      h("p",{style:{color:"#555",fontSize:12,marginBottom:22}},"Panel de control para TikTok LIVE"),
      h("div",{style:{marginBottom:12}},
        h("label",{style:LBL},"Correo"),
        h("input",{value:email,onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==="Enter"&&go(),type:"email",placeholder:"tu@correo.com",style:INP})
      ),
      h("div",{style:{marginBottom:16}},
        h("label",{style:LBL},"Contraseña"),
        h("input",{value:pass,onChange:e=>setPass(e.target.value),onKeyDown:e=>e.key==="Enter"&&go(),type:"password",placeholder:"••••••••",style:INP})
      ),
      err && h("div",{style:{background:"rgba(254,44,85,.08)",border:"1px solid rgba(254,44,85,.2)",borderRadius:8,padding:"8px 12px",color:"#fe2c55",fontSize:12,marginBottom:12}},err),
      h("button",{onClick:go,disabled:loading,style:{width:"100%",background:loading?"#1e1e2e":"linear-gradient(135deg,#fe2c55,#ff6b81)",border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}},
        loading?"Verificando...":"Ingresar →")
    )
  );
}

// ─── Modal Acción ────────────────────────────────
function ActModal({action, ttsVol, onSave, onClose}) {
  const def = {id:Date.now(),enabled:true,name:"",event:"Gift Alert",giftName:"Cualquier regalo",minCount:1,duration:5,soundName:"",soundData:"",ttsOn:false,ttsText:""};
  const [f, setF] = useState(action ? {...action} : def);
  const [busy, setBusy] = useState(false);
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  const handleFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setBusy(true);
    try { const d = await fileToBase64(file); set("soundData",d); set("soundName",file.name); }
    catch(_) { alert("Error al leer archivo"); }
    setBusy(false);
  };

  return h("div",{className:"mo",onClick:e=>e.target.className==="mo"&&onClose()},
    h("div",{className:"mb"},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}},
        h("div",{style:{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16}}, action?"✏️ Editar Acción":"➕ Nueva Acción"),
        h("button",{onClick:onClose,style:{background:"#1a1a28",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",color:"#555",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}},"✕")
      ),
      // Nombre
      h("div",{style:{marginBottom:12}},
        h("label",{style:LBL},"Nombre de la acción"),
        h("input",{value:f.name,onChange:e=>set("name",e.target.value),placeholder:"Ej: Rosa Sound",style:INP})
      ),
      // Evento + Duración
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:12}},
        h("div",null, h("label",{style:LBL},"Evento"),
          h("select",{value:f.event,onChange:e=>set("event",e.target.value),style:{...INP,cursor:"pointer"}},
            EV_TYPES.map(t=>h("option",{key:t},t)))),
        h("div",null, h("label",{style:LBL},"Duración (seg)"),
          h("input",{type:"number",min:1,max:120,value:f.duration,onChange:e=>set("duration",Number(e.target.value)),style:INP}))
      ),
      // Regalo (si aplica)
      f.event==="Gift Alert" && h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:12}},
        h("div",null, h("label",{style:LBL},"Regalo TikTok"),
          h("select",{value:f.giftName,onChange:e=>set("giftName",e.target.value),style:{...INP,cursor:"pointer"}},
            TIKTOK_GIFTS.map(g=>h("option",{key:g},g)))),
        h("div",null, h("label",{style:LBL},"Cantidad mínima"),
          h("input",{type:"number",min:1,value:f.minCount,onChange:e=>set("minCount",Number(e.target.value)),style:INP}))
      ),
      // Sonido
      h("div",{style:{marginBottom:12}},
        h("label",{style:LBL},"Sonido de alerta (MP3/WAV)"),
        h("div",{className:`ua ${f.soundName?"has":""}` },
          h("input",{type:"file",accept:"audio/*",onChange:handleFile,disabled:busy}),
          h("div",{style:{width:32,height:32,borderRadius:8,background:"rgba(37,244,238,.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}},
            busy ? h("span",{className:"spinner"}) : "🎵"),
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontSize:12,fontWeight:600,color:f.soundName?"#25f4ee":"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
              busy?"Cargando...":f.soundName||"Toca para subir audio"),
            h("div",{style:{fontSize:9,color:f.soundName?"rgba(37,244,238,.6)":"#444",marginTop:2}},
              f.soundName?"✓ Guardado":"MP3, WAV, OGG")),
          f.soundData && h("button",{
            onClick:e=>{e.preventDefault();e.stopPropagation();playAudio(f.soundData,(ttsVol||80)/100);},
            style:{background:"rgba(37,244,238,.1)",border:"1px solid rgba(37,244,238,.3)",borderRadius:7,padding:"5px 10px",color:"#25f4ee",fontSize:10,fontWeight:700,cursor:"pointer",zIndex:2,position:"relative",flexShrink:0}
          },"▶ Probar"),
          f.soundName && h("button",{
            onClick:e=>{e.preventDefault();e.stopPropagation();set("soundData","");set("soundName","");},
            style:{background:"rgba(254,44,85,.08)",border:"1px solid rgba(254,44,85,.2)",borderRadius:7,padding:"5px 9px",color:"#fe2c55",fontSize:10,fontWeight:700,cursor:"pointer",zIndex:2,position:"relative",flexShrink:0}
          },"✕")
        )
      ),
      // TTS
      h("div",{style:{marginBottom:18}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}},
          h("label",{style:{...LBL,marginBottom:0}},"Mensaje TTS"),
          h("div",{style:{display:"flex",alignItems:"center",gap:6}},
            h(Toggle,{on:f.ttsOn,onChange:()=>set("ttsOn",!f.ttsOn),color:"#25f4ee",size:"sm"}),
            h("span",{style:{fontSize:9,color:f.ttsOn?"#25f4ee":"#444",fontWeight:700}},f.ttsOn?"ACTIVO":"APAGADO")
          )
        ),
        h("textarea",{value:f.ttsText,onChange:e=>set("ttsText",e.target.value),disabled:!f.ttsOn,
          placeholder:"Ej: ¡Gracias @usuario!",
          style:{width:"100%",background:"#0a0a0f",border:`1px solid ${f.ttsOn?"rgba(37,244,238,.25)":"#252535"}`,borderRadius:9,padding:"9px 12px",color:f.ttsOn?"#fff":"#333",fontSize:12,outline:"none",resize:"vertical",minHeight:55}}),
        h("div",{style:{color:"#444",fontSize:9,marginTop:4}},
          "💡 ", h("span",{style:{color:"#25f4ee",fontFamily:"monospace"}},"@usuario"), " se reemplaza con el nombre")
      ),
      // Botones
      h("div",{style:{display:"flex",gap:8}},
        h("button",{onClick:onClose,style:{flex:1,background:"transparent",border:"1px solid #252535",borderRadius:9,padding:"10px",color:"#555",fontWeight:600,cursor:"pointer",fontSize:12}},"Cancelar"),
        h("button",{
          onClick:()=>{if(!f.name.trim()){alert("Ponle un nombre");return;}onSave({...f});},
          style:{flex:2,background:"linear-gradient(135deg,#fe2c55,#ff6b81)",border:"none",borderRadius:9,padding:"10px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}
        },"💾 Guardar Acción")
      )
    )
  );
}

// ─── App principal ───────────────────────────────
function App() {
  const [user, setUser] = useState(() => ld("session",null));
  const [tab, setTab] = useState(() => ld("tab","dashboard"));
  const [sb, setSb] = useState(false);

  // Conexión
  const [tUser, setTUser] = useState(() => ld("tuser",""));
  const [sessId, setSessId] = useState(() => ld("sessid",""));
  const [conn, setConn] = useState(false);
  const [conn2, setConn2] = useState(false);
  const [connErr, setConnErr] = useState("");
  const [dots, setDots] = useState("");

  // Stats
  const [stats, setStats] = useState({viewers:0,gifts:0,follows:0,messages:0,likes:0});
  const [log2, setLog2] = useState([]);
  const [totDia, setTotDia] = useState(() => ld("totDia",0));
  const [totLike, setTotLike] = useState(() => ld("totLike",0));
  const [tapR, setTapR] = useState(() => ld("tapR",[]));
  const [likeR, setLikeR] = useState(() => ld("likeR",[]));
  const [viewR, setViewR] = useState(() => ld("viewR",[]));

  // TTS
  const [ttsVol, setTtsVol] = useState(() => ld("ttsVol",80));
  const [ttsOn, setTtsOn] = useState(() => ld("ttsOn",true));
  const ttsOnR = useRef(ttsOn);
  const ttsVolR = useRef(ttsVol);
  useEffect(() => { ttsOnR.current=ttsOn; sv("ttsOn",ttsOn); }, [ttsOn]);
  useEffect(() => { ttsVolR.current=ttsVol; sv("ttsVol",ttsVol); }, [ttsVol]);

  // Acciones
  const [actions, setActions] = useState(() => ld("actions4",DEF_ACTIONS));
  const [alertsOn, setAlertsOn] = useState(() => ld("alertsOn",true));
  const [showM, setShowM] = useState(false);
  const [editA, setEditA] = useState(null);
  const [toast, setToast] = useState("");
  const actsR = useRef(actions);
  const alertsOnR = useRef(alertsOn);

  useEffect(() => { actsR.current=actions; sv("actions4",actions); }, [actions]);
  useEffect(() => { alertsOnR.current=alertsOn; sv("alertsOn",alertsOn); }, [alertsOn]);
  useEffect(() => { sv("tab",tab); }, [tab]);
  useEffect(() => { sv("tuser",tUser); }, [tUser]);
  useEffect(() => { sv("sessid",sessId); }, [sessId]);
  useEffect(() => { sv("totDia",totDia); }, [totDia]);
  useEffect(() => { sv("totLike",totLike); }, [totLike]);
  useEffect(() => { sv("tapR",tapR); }, [tapR]);
  useEffect(() => { sv("likeR",likeR); }, [likeR]);
  useEffect(() => { sv("viewR",viewR); }, [viewR]);

  const showT = msg => { setToast(msg); setTimeout(()=>setToast(""),2500); };

  // Dots animación
  useEffect(() => {
    if (!conn2) return;
    const t = setInterval(() => setDots(d => d.length>=3?"":d+"."), 400);
    return () => clearInterval(t);
  }, [conn2]);

  // Disparar acción
  const fireAction = useCallback((eventType, giftName="", nickname="", giftCount=1) => {
    if (!alertsOnR.current) return;
    const acts = actsR.current.filter(a => a.enabled && a.event===eventType);
    for (const act of acts) {
      if (act.event==="Gift Alert") {
        const gn=(giftName||"").toLowerCase(), an=(act.giftName||"").toLowerCase();
        if (an!=="cualquier regalo" && !gn.includes(an) && !an.includes(gn)) continue;
        if (giftCount < act.minCount) continue;
      }
      if (act.soundData) playAudio(act.soundData, ttsVolR.current/100);
      if (act.ttsOn && act.ttsText && ttsOnR.current) {
        const text = act.ttsText.replace(/@usuario/gi, nickname);
        enqueueTTS(text, ttsVolR.current/100);
      }
    }
  }, []);

  // Socket.IO
  useEffect(() => {
    const sock = io(SERVER, {transports:["websocket","polling"],reconnection:true,reconnectionDelay:2000,timeout:15000});
    sock.on("connect", () => console.log("Socket OK:", sock.id));
    sock.on("connect_error", e => console.warn("Socket error:", e.message));

    sock.on("event", d => {
      if (d.type==="chat") {
        setLog2(p=>[{t:"msg",tx:`💬 @${d.nickname||d.user}: ${d.comment}`},...p].slice(0,50));
        setStats(p=>({...p,messages:p.messages+1}));
      } else if (d.type==="gift") {
        const dm = d.diamondCount||0;
        setLog2(p=>[{t:"gift",tx:`🎁 @${d.nickname} → ${d.giftCount}× ${d.giftName}`},...p].slice(0,50));
        setStats(p=>({...p,gifts:p.gifts+1}));
        setTotDia(p=>p+dm);
        setTapR(prev=>{
          const ex=prev.find(u=>u.user===d.user);
          const upd=ex?prev.map(u=>u.user===d.user?{...u,diamonds:u.diamonds+dm,gifts:u.gifts+1}:u):[...prev,{user:d.user,nickname:d.nickname||d.user,diamonds:dm,gifts:1}];
          return upd.sort((a,b)=>b.diamonds-a.diamonds).slice(0,10);
        });
        fireAction("Gift Alert",d.giftName,d.nickname||d.user,d.giftCount);
      } else if (d.type==="follow") {
        setLog2(p=>[{t:"follow",tx:`➕ @${d.nickname||d.user} te siguió`},...p].slice(0,50));
        setStats(p=>({...p,follows:p.follows+1}));
        fireAction("Follow Alert","",d.nickname||d.user);
      } else if (d.type==="like") {
        const lc=d.likeCount||1;
        setLog2(p=>[{t:"like",tx:`❤️ ×${lc} de @${d.nickname||d.user}`},...p].slice(0,50));
        setStats(p=>({...p,likes:p.likes+lc}));
        setTotLike(p=>p+lc);
        setLikeR(prev=>{
          const ex=prev.find(u=>u.user===d.user);
          const upd=ex?prev.map(u=>u.user===d.user?{...u,count:u.count+lc}:u):[...prev,{user:d.user,nickname:d.nickname||d.user,count:lc}];
          return upd.sort((a,b)=>b.count-a.count).slice(0,10);
        });
        fireAction("Like Alert","",d.nickname||d.user);
      } else if (d.type==="sub") {
        setLog2(p=>[{t:"sub",tx:`⭐ @${d.nickname||d.user} se suscribió`},...p].slice(0,50));
        fireAction("Sub Alert","",d.nickname||d.user);
      } else if (d.type==="share") {
        setLog2(p=>[{t:"share",tx:`📤 @${d.nickname||d.user} compartió`},...p].slice(0,50));
        fireAction("Share Alert","",d.nickname||d.user);
      }
    });

    sock.on("viewers", d => setStats(p=>({...p,viewers:d.count||0})));

    sock.on("member", d => {
      if (!d.user) return;
      setViewR(prev=>{
        const ex=prev.find(u=>u.user===d.user);
        if(ex) return prev.map(u=>u.user===d.user?{...u,joinTime:Date.now()}:u);
        return [{user:d.user,nickname:d.nickname||d.user,joinTime:Date.now()},...prev].slice(0,300);
      });
    });

    sock.on("tiktok_disconnected", d => {
      setConn(false);
      setLog2(p=>[{t:"sys",tx:`⚠️ Desconectado @${d?.username||"?"}`},...p].slice(0,50));
    });
    sock.on("tiktok_error", d => {
      setLog2(p=>[{t:"sys",tx:`⚠️ ${d.message}`},...p].slice(0,50));
    });

    return () => sock.disconnect();
  }, [fireAction]);

      if (d.success) {
        setConn2(false); setConn(true);
        setStats({viewers:0,gifts:0,follows:0,messages:0,likes:0});
        setTotDia(0); setTotLike(0); setTapR([]); setLikeR([]); setViewR([]);
        setLog2([{t:"sys",tx:`✅ Conectado a @${tUser}`}]);
      } else {
        setConn2(false); setConnErr(d.error||"¿Estás en LIVE?");
        setLog2(p=>[{t:"sys",tx:`⚠️ ${d.error||"Error de conexión"}`},...p]);
      }
    } catch(e) {
      setConn2(false); setConnErr("Sin respuesta del servidor");
      setLog2(p=>[{t:"sys",tx:"⚠️ Sin respuesta del servidor"},...p]);
    }
  };

        ),
        connErr && h("div",{style:{background:"rgba(254,44,85,.08)",border:"1px solid rgba(254,44,85,.2)",borderRadius:8,padding:"8px 12px",color:"#fe2c55",fontSize:12,marginBottom:10}},connErr),
        h("button",{onClick:connect,disabled:conn2||!tUser.trim(),
          style:{width:"100%",background:conn2||!tUser.trim()?"#1e1e2e":"linear-gradient(135deg,#25f4ee,#00b8b0)",border:"none",borderRadius:10,padding:"11px",color:conn2||!tUser.trim()?"#444":"#000",fontSize:13,fontWeight:700,cursor:"pointer"}},
          conn2?`Conectando${dots}`:"⚡ Conectar al LIVE")
      ),

      // ── Contenido tab ──
      renderTab()
    )
  );
}

// ─── Mount ───────────────────────────────────────
function init() {
  const loading = document.getElementById("loading");
  try {
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(h(App));
    if (loading) loading.style.display = "none";
  } catch(err) {
    console.error("Error montando React:", err);
    if (loading) {
      loading.innerHTML = `
        <div style="color:#fe2c55;font-size:14px;font-weight:700;">Error al cargar</div>
        <div style="color:#555;font-size:11px;margin-top:8px;">${err.message}</div>
        <button onclick="location.reload()" style="margin-top:16px;background:#fe2c55;border:none;border-radius:8px;padding:8px 16px;color:#fff;cursor:pointer;font-weight:700;">Reintentar</button>
      `;
    }
  }
}

// Esperar a que React esté disponible
if (window.React && window.ReactDOM) {
  init();
} else {
  window.addEventListener("load", init);
}
</script>
</body>
</html>
